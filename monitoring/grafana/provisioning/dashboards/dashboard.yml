---
# Grafana dashboard provisioning
# Loads all .json dashboards from the configured path on Grafana start.

apiVersion: 1

providers:
  - name: ACME Network Dashboards
    orgId: 1
    folder: ACME Network
    folderUid: acme-network
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
