---
# ACME Investments — Business Requirements Register
# Layer 1 of the Intent-Based Networking (IBN) model
#
# Each requirement is expressed in business language — what the network
# must do, not how it does it. The design_intents field links each
# requirement to the Layer 2 design intents that implement it.
#
# Traceability chain:
#   requirements/ (Layer 1)
#     → design_intents/ (Layer 2)
#       → sot/ with intent_refs (Layer 3)
#         → Generated device configurations
#
# Owners:
#   CTO         — Chief Technology Officer
#   CISO        — Chief Information Security Officer
#   Head-Compl  — Head of Compliance
#   Head-NetOps — Head of Network Operations
#   Head-Infra  — Head of Infrastructure
#   CAB         — Change Advisory Board
#
# Reviewed by: CTO, CISO, Head of Compliance — 2026-03-01
# Next review due: 2027-03-01

requirements:

  # ────────────────────────────────────────────────────────────────────
  # CATEGORY: Governance & Pipeline
  # Network changes must be governed, auditable, and driven from a
  # single authoritative source. Manual device configuration is not
  # permitted in regulated environments.
  # ────────────────────────────────────────────────────────────────────

  - id: REQ-001
    title: "All configuration changes must originate from the Source of Truth"
    category: governance
    priority: critical
    owner: Head-NetOps
    description: >
      Every device configuration must be rendered from the Source of Truth
      (SoT) via the automation pipeline. Manual out-of-band changes to
      device configurations are prohibited. Any configuration that cannot
      be traced back to a SoT record is considered unauthorised.
    rationale: >
      Manual changes are the primary source of configuration drift and
      compliance violations. Regulatory frameworks (MiFID II, SOX, BaFin
      BAIT) require demonstrable change controls over infrastructure that
      supports regulated activities.
    regulatory_refs:
      - framework: mifid2
        reference: "MiFID II Article 17 — Algorithmic trading controls"
        obligation: "Firms must have adequate controls over trading infrastructure changes"
      - framework: sox
        reference: "SOX Section 404 — IT general controls"
        obligation: "Change management controls over systems supporting financial reporting"
      - framework: bafin
        reference: "BAIT Section 8 — IT operations"
        obligation: "Changes to IT systems must follow a documented, controlled process"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-009]
    sot_enforcement:
      - "sot/compliance/regulatory.yml — change_freeze_windows per region"
      - ".gitlab-ci.yml validate stage — blocks pipeline on SoT validation failure"

  - id: REQ-002
    title: "Device configurations must be generated from templates — no hand-crafted configs"
    category: governance
    priority: high
    owner: Head-NetOps
    description: >
      Jinja2 templates must be the sole mechanism for producing device
      configurations. Templates are version-controlled. Ad hoc config
      fragments committed directly to device files are prohibited.
      Template logic must be reviewable and testable independently of
      device state.
    rationale: >
      Hand-crafted configurations introduce inconsistency across devices
      of the same role and make compliance assertions impossible.
      Template-driven generation ensures every device of a given role
      produces structurally identical output.
    regulatory_refs:
      - framework: fca
        reference: "FCA SYSC 8.1 — Outsourcing and operational controls"
        obligation: "Consistent, documented operational procedures"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-009]

  - id: REQ-003
    title: "Branch provisioning must follow the standard onboarding process"
    category: provisioning
    priority: high
    owner: Head-NetOps
    description: >
      Every new branch office must be provisioned using the standard
      automated workflow: ASN allocated from the regional pool, a /29
      prefix assigned from the branch supernet, compliance tags applied
      for the region, and zone access restricted to CORPORATE only.
      No branch may be connected to the network without a corresponding
      SoT record.
    rationale: >
      Inconsistent branch provisioning has historically resulted in
      incorrect zone assignments, missing compliance tags, and IP
      address conflicts. The standard process eliminates these failure
      modes and ensures every branch is covered by compliance assertions
      from day one.
    regulatory_refs:
      - framework: fca
        reference: "FCA SYSC 6.1 — Compliance function"
        obligation: "Consistent controls across all office locations"
      - framework: gdpr
        reference: "GDPR Article 32 — Security of processing"
        obligation: "Appropriate controls must apply at all locations processing personal data"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: branch_devices
    design_intents: [INTENT-010]
    sot_enforcement:
      - "sot/devices/branches/ — ASN from regional pool, /29 prefix, compliance_tags"
      - "sot/compliance/zone_policies.yml — branch_standard: TRADING false"

  - id: REQ-004
    title: "Every network device must have a SoT record before being deployed"
    category: governance
    priority: high
    owner: Head-NetOps
    description: >
      No device may be cabled, powered on, or connected to the production
      network without a corresponding SoT device record that includes:
      hostname, role, platform, site, region, management IP, and
      compliance tags. Unregistered devices must not receive a
      configuration from the pipeline.
    rationale: >
      Shadow infrastructure — devices that exist on the network without
      a management record — is a primary audit finding and creates
      uncontrolled attack surface. All regulators require an accurate
      inventory of systems supporting regulated services.
    regulatory_refs:
      - framework: mifid2
        reference: "MiFID II RTS 7 — Organisational requirements"
        obligation: "Firms must maintain accurate records of systems used for trading"
      - framework: mas
        reference: "MAS TRM Guidelines 9.1 — IT asset management"
        obligation: "Complete and accurate inventory of all IT assets"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-009]

  - id: REQ-005
    title: "All devices must carry regulatory compliance tags matching their region"
    category: governance
    priority: high
    owner: Head-Compl
    description: >
      Every device SoT record must include a compliance_tags field
      populated with the regulatory frameworks applicable to its region
      and site type. Tags must be applied consistently as defined in
      sot/compliance/regulatory.yml. Missing or incorrect compliance tags
      will cause compliance reports to produce incorrect results.
    rationale: >
      Compliance tags are the mechanism by which automated tooling
      determines which controls apply to which devices. Incorrect tags
      produce incorrect compliance reports, which may mislead regulators
      and auditors.
    regulatory_refs:
      - framework: sox
        reference: "SOX Section 404"
        obligation: "Controls must be scoped and documented accurately"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-009]
    sot_enforcement:
      - "sot/compliance/regulatory.yml — device_compliance_tags per site type"

  - id: REQ-006
    title: "Every configuration change must produce a tamper-evident audit artefact"
    category: governance
    priority: critical
    owner: Head-Compl
    description: >
      Each pipeline run that produces a device configuration change must
      generate a signed, timestamped diff of the before and after
      configuration. This artefact must be stored in the CI/CD system
      and retained for the period required by the applicable regulatory
      framework (minimum 7 years for MiFID II / FCA regions).
    rationale: >
      MiFID II and SOX require firms to demonstrate that changes to
      systems supporting regulated activities were authorised,
      documented, and reversible. The audit artefact is the primary
      evidence submitted to regulators and auditors on request.
    regulatory_refs:
      - framework: mifid2
        reference: "MiFID II Article 25 — Transaction record keeping"
        obligation: "5-year retention of records relating to regulated activities"
      - framework: fca
        reference: "FCA SYSC 9.1 — Record-keeping"
        obligation: "7-year retention for FCA-regulated firms"
      - framework: sox
        reference: "SOX Section 802 — Record retention"
        obligation: "7-year retention of audit-relevant records"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-009]

  # ────────────────────────────────────────────────────────────────────
  # CATEGORY: Zone Isolation
  # The TRADING zone carries order flow and market data. Cross-zone
  # traffic from TRADING into CORPORATE or DMZ is prohibited under
  # MiFID II and FCA conduct rules. All enforcement must be
  # machine-verifiable and provable to auditors.
  # ────────────────────────────────────────────────────────────────────

  - id: REQ-007
    title: "Trading systems must not have network reachability to corporate user systems"
    category: zone_isolation
    priority: critical
    owner: CISO
    description: >
      Systems in the TRADING zone (VLAN 100 / TRADING_VRF) must have no
      network path to systems in the CORPORATE zone (VLAN 200 /
      CORPORATE_VRF) in either direction. This prohibition applies at
      the IP routing layer (VRF isolation) and must be enforced on all
      DC sites where the TRADING zone exists (LON, NYC, SIN, HKG).
      Firewall rules alone are not sufficient — VRF separation must
      be implemented at the routing layer.
    rationale: >
      MiFID II requires that trading infrastructure is operationally
      isolated from non-trading systems. Cross-contamination of order
      flow data into corporate systems, or conversely, corporate
      malware reaching trading systems, constitutes a serious regulatory
      breach. The FCA has issued enforcement notices against firms where
      this boundary was inadequately enforced.
    regulatory_refs:
      - framework: mifid2
        reference: "MiFID II Article 17(1) — Algorithmic trading safeguards"
        obligation: "Effective systems and risk controls to prevent trading irregularities"
      - framework: fca
        reference: "FCA MAR 7A — Algorithmic trading"
        obligation: "Organisational requirements including system segregation"
      - framework: sec
        reference: "SEC Reg SCI Section 242.1001(a)"
        obligation: "Systems compliance and integrity — physical and logical separation of trading systems"
    regions: [emea-lon, americas-nyc, apac]
    applies_to: [spine, leaf, border, firewall]
    design_intents: [INTENT-001]
    sot_enforcement:
      - "sot/compliance/zone_policies.yml — inter_zone_access TRADING to_CORPORATE: denied"
      - "sot/compliance/zone_policies.yml — ZONE-003 audit check — vrf_route_leak"

  - id: REQ-008
    title: "Trading systems must not have network reachability to the DMZ"
    category: zone_isolation
    priority: critical
    owner: CISO
    description: >
      Systems in the TRADING zone must have no network path to the DMZ
      (VLAN 300 / DMZ_VRF). Trading systems access external market data
      and order routing via dedicated cross-connects, not via the shared
      DMZ. The shared DMZ must be completely unreachable from TRADING_VRF.
    rationale: >
      The DMZ hosts internet-facing and partner-facing systems. If
      TRADING VRF had reachability to the DMZ, a compromise of an
      internet-facing DMZ service could provide an attack path into
      trading infrastructure. This is treated as equivalent in severity
      to TRADING→CORPORATE reachability.
    regulatory_refs:
      - framework: mifid2
        reference: "MiFID II Article 17(1)"
        obligation: "Trading system controls — prevent external system interference"
      - framework: fca
        reference: "FCA SYSC 13.9 — Information security"
        obligation: "Appropriate network segregation between external-facing and sensitive systems"
    regions: [emea-lon, americas-nyc, apac]
    applies_to: [spine, leaf, border, firewall]
    design_intents: [INTENT-002]
    sot_enforcement:
      - "sot/compliance/zone_policies.yml — inter_zone_access TRADING to_DMZ: denied"
      - "sot/compliance/zone_policies.yml — ZONE-003 audit check"

  # ────────────────────────────────────────────────────────────────────
  # CATEGORY: Data Residency & Regulatory Ring-fencing
  # EU and UK data residency rules require that regulated data does not
  # traverse non-compliant network paths. Frankfurt is a regulatory/
  # reporting hub only — trading systems must not be present there.
  # ────────────────────────────────────────────────────────────────────

  - id: REQ-009
    title: "EU/UK-regulated data must not traverse non-EU/UK routing paths"
    category: data_residency
    priority: critical
    owner: Head-Compl
    description: >
      Inter-region BGP routing must not create paths where EU or
      UK-origin data is routed through non-EU/UK infrastructure. In
      practice: Frankfurt (eu-fra) must not have direct BGP adjacencies
      to APAC border routers (sin-dc1, hkg-dc1). All Frankfurt traffic
      destined for APAC must route via London (emea-lon), which is the
      designated EU/UK hub region. Route advertisements from Frankfurt
      must not include APAC-specific routes that would attract
      APAC-origin return traffic through Frankfurt.
    rationale: >
      GDPR Article 44 prohibits transfers of EU personal data to third
      countries without adequate safeguards. BaFin BAIT requires that
      regulated data remains within Germany (or EU with explicit
      approval). An APAC→FRA direct BGP path would create uncontrolled
      data flows that are impossible to audit.
    regulatory_refs:
      - framework: gdpr
        reference: "GDPR Article 44 — Transfers to third countries"
        obligation: "Personal data must not be transferred to third countries without adequacy or SCC"
      - framework: bafin
        reference: "BAIT Section 9 — Data governance"
        obligation: "Regulated data must remain in Germany or EU with documented controls"
      - framework: mifid2
        reference: "MiFID II RTS 22 — Transaction reporting"
        obligation: "Transaction data must be reported via EU-approved channels"
    regions: [eu-fra]
    applies_to: [border]
    design_intents: [INTENT-003]
    sot_enforcement:
      - "sot/devices/fra-dc1/border-fra-01.yml — BGP neighbors: LON only, no APAC peers"
      - "sot/compliance/regulatory.yml — eu-fra data_residency: data_must_stay_in [EU]"

  - id: REQ-010
    title: "Frankfurt DC must not carry TRADING zone traffic or host trading systems"
    category: data_residency
    priority: critical
    owner: Head-Compl
    description: >
      The Frankfurt data centre (fra-dc1) is designated as a regulatory
      and reporting hub only. TRADING zone (VLAN 100 / TRADING_VRF)
      must not exist at fra-dc1 in any form — not in VLAN databases,
      not in VRF configurations, and not as BGP-advertised prefixes.
      BGP route-maps on the LON→FRA session must strip all TRADING
      community prefixes both inbound and outbound.
    rationale: >
      BaFin has explicitly stated that trading systems must not operate
      from German-regulated entities without full BaFin authorisation
      for trading activities. ACME's Frankfurt entity is authorised for
      reporting and regulatory functions only. Any TRADING zone presence
      would constitute an unauthorised extension of regulated activity.
    regulatory_refs:
      - framework: bafin
        reference: "BAIT Section 2 — Scope of regulated activities"
        obligation: "IT systems must only support activities within the firm's regulatory permissions"
      - framework: mifid2
        reference: "MiFID II Article 35 — Passporting"
        obligation: "Activities must be conducted within the scope of the firm's authorisation"
    regions: [eu-fra]
    applies_to: [spine, leaf, border, firewall]
    design_intents: [INTENT-003, INTENT-004]
    sot_enforcement:
      - "sot/compliance/zone_policies.yml — dc_frankfurt: TRADING false"
      - "sot/compliance/zone_policies.yml — ZONE-001 audit check — vlan_absent 100 fra-dc1"
      - "sot/bgp/route_policies.yml — RM_INTERDC_LON_FRA_OUT: strips TRADING prefixes and community"
      - "sot/bgp/route_policies.yml — RM_INTERDC_LON_FRA_IN: denies TRADING community inbound"

  - id: REQ-011
    title: "Branch offices must never carry TRADING zone traffic"
    category: data_residency
    priority: high
    owner: CISO
    description: >
      Branch offices are standard corporate connectivity sites only.
      They must never carry TRADING zone traffic. VLAN 100 must be
      absent from all branch device configurations. Branch routers
      must only be connected to CORPORATE_VRF via their DC parent
      border router. Trading floor connectivity (where required) uses
      dedicated leased lines, not the branch WAN infrastructure.
    rationale: >
      Trading traffic traversing standard branch WAN circuits would
      expose order flow to uncontrolled network paths and would mix
      regulated and non-regulated data on the same infrastructure,
      making compliance attestation impossible.
    regulatory_refs:
      - framework: fca
        reference: "FCA COBS 11.2 — Best execution"
        obligation: "Order routing must use controlled, low-latency paths"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: branch_devices
    design_intents: [INTENT-010]
    sot_enforcement:
      - "sot/compliance/zone_policies.yml — branch_standard: TRADING false"
      - "sot/compliance/zone_policies.yml — ZONE-002 audit check"

  # ────────────────────────────────────────────────────────────────────
  # CATEGORY: BGP Security
  # All BGP sessions carry routing information that directly controls
  # how data flows across the network. Unprotected BGP sessions are
  # a material security risk in a financial services environment.
  # ────────────────────────────────────────────────────────────────────

  - id: REQ-012
    title: "All BGP sessions must use MD5 authentication"
    category: bgp_security
    priority: critical
    owner: CISO
    description: >
      Every BGP neighbour relationship — iBGP (fabric), eBGP
      (inter-region WAN), and eBGP (branch) — must be configured with
      MD5 TCP authentication. The MD5 key must be stored in the secrets
      vault (not in the SoT in plain text) and referenced by key name.
      Sessions without MD5 must be treated as a critical finding and
      remediated before the next change window.
    rationale: >
      BGP session hijacking via spoofed TCP RST or injected UPDATE
      messages is a well-documented attack vector. In a financial
      environment, a forged BGP UPDATE could redirect trading traffic
      to an adversary-controlled path, with immediate financial and
      regulatory consequences. MD5 authentication prevents session
      spoofing.
    regulatory_refs:
      - framework: fca
        reference: "FCA SYSC 13.9 — Network security"
        obligation: "Appropriate technical controls on network infrastructure"
      - framework: mas
        reference: "MAS TRM 11.2 — Network security"
        obligation: "Authentication controls on all critical network sessions"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: [spine, leaf, border]
    design_intents: [INTENT-005]
    sot_enforcement:
      - "Every bgp.neighbors[*].md5_password_ref must be non-null in device files"
      - "sot/devices/lon-dc1/border-lon-01.yml — md5_password_ref on all 14 neighbors"

  - id: REQ-013
    title: "All eBGP sessions must have explicit route-maps applied inbound and outbound"
    category: bgp_security
    priority: high
    owner: Head-NetOps
    description: >
      Every external BGP (eBGP) session — to inter-region borders and
      to branch routers — must have an explicit route-map applied in
      both the inbound and outbound direction. Implicit default-accept
      or default-deny is not permitted on eBGP sessions. Route-maps
      must be defined in sot/bgp/route_policies.yml and referenced
      by name in device files.
    rationale: >
      Unfiltered eBGP sessions can accept unexpected route
      advertisements that alter traffic paths without detection.
      Explicit route-maps ensure that only expected prefixes are
      accepted and that only intended prefixes are advertised.
      This is the primary mechanism for enforcing inter-region
      routing policy.
    regulatory_refs:
      - framework: sec
        reference: "SEC Reg SCI 242.1001 — System integrity"
        obligation: "Controls to prevent unintended traffic routing"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: [border]
    design_intents: [INTENT-006]
    sot_enforcement:
      - "sot/bgp/route_policies.yml — all RM_ entries"
      - "Device files: route_map_in and route_map_out set on every eBGP neighbor"

  - id: REQ-014
    title: "Branch routers must only advertise their assigned /29 prefix"
    category: bgp_security
    priority: high
    owner: Head-NetOps
    description: >
      Each branch router is allocated exactly one /29 prefix from the
      regional branch supernet. The branch router may only originate and
      advertise this /29 to the parent DC border router. Advertising
      any other prefix (default route, more-specific, or a prefix from
      another branch's allocation) constitutes a routing policy
      violation and must be rejected by the inbound route-map on the
      border router.
    rationale: >
      A branch advertising an unexpected prefix could cause traffic
      from other branches, or from the DC, to be mis-routed through
      that branch. In a financial environment this could affect trading
      connectivity or expose sensitive traffic to an uncontrolled path.
    regulatory_refs:
      - framework: fca
        reference: "FCA SYSC 13.9"
        obligation: "Controls on network paths used by regulated services"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: [border, branch]
    design_intents: [INTENT-007]
    sot_enforcement:
      - "sot/bgp/route_policies.yml — RM_BRANCH_IN seq 20: deny all non-branch prefixes"
      - "sot/devices/branches/ — each branch has exactly one /29 prefix"

  # ────────────────────────────────────────────────────────────────────
  # CATEGORY: Compliance Controls
  # Baseline operational controls required by all applicable regulatory
  # frameworks. Applies to every managed network device.
  # ────────────────────────────────────────────────────────────────────

  - id: REQ-015
    title: "All devices must send audit logs to the central syslog infrastructure"
    category: compliance_controls
    priority: critical
    owner: Head-Compl
    description: >
      Every network device must be configured to forward syslog events
      at severity informational and above to the designated syslog
      servers. Log source must be the device loopback address (not
      management interface) to ensure log continuity during interface
      flaps. Logs must be retained for the period required by the
      applicable regional regulatory framework.
    rationale: >
      Audit logging is a baseline regulatory requirement across all
      frameworks. Without central log collection, it is impossible to
      reconstruct what happened on the network during a security
      incident, trading irregularity, or compliance investigation.
      FCA SYSC requires 7 years of log retention for UK entities.
    regulatory_refs:
      - framework: mifid2
        reference: "MiFID II Article 25(2) — Record keeping"
        obligation: "Records of transactions and related communications retained for 5 years"
      - framework: fca
        reference: "FCA SYSC 9.1 — Record-keeping requirements"
        obligation: "7-year retention for FCA-regulated activities"
      - framework: sox
        reference: "SOX Section 802 — Audit record retention"
        obligation: "7-year retention of records related to financial reporting controls"
      - framework: bafin
        reference: "MaRisk AT 7.2 — Logging and monitoring"
        obligation: "Comprehensive logging of all system activities"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-011]
    sot_enforcement:
      - "sot/global/platform_defaults.yml — logging.servers and logging.source_interface"

  - id: REQ-016
    title: "All devices must synchronise time via authenticated NTP"
    category: compliance_controls
    priority: critical
    owner: Head-Compl
    description: >
      Every network device must synchronise its clock to the designated
      NTP servers using authenticated NTP. Unauthenticated NTP is
      prohibited. Trading systems require clock accuracy to within
      100 microseconds of UTC (MiFID II RTS 25). Network devices must
      achieve at least millisecond accuracy. NTP source interface must
      be the management interface.
    rationale: >
      Accurate timestamps are essential for: audit log correlation
      across systems, regulatory transaction reporting (MiFID II RTS 22
      requires T+1 reporting with accurate timestamps), incident
      investigation, and BGP session timer accuracy. Clock skew of more
      than a few seconds will corrupt log correlation and may invalidate
      compliance reports.
    regulatory_refs:
      - framework: mifid2
        reference: "MiFID II RTS 25 — Clock synchronisation"
        obligation: "Clocks synchronised to UTC within 100μs for gated clocks; 1ms for other systems"
      - framework: mas
        reference: "MAS TRM 9.2 — Time synchronisation"
        obligation: "All systems must synchronise to an authoritative time source"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-011]
    sot_enforcement:
      - "sot/global/platform_defaults.yml — ntp.authenticate: true"
      - "sot/global/ntp.yml — NTP server definitions"

  - id: REQ-017
    title: "Telnet must be disabled on all network devices"
    category: compliance_controls
    priority: critical
    owner: CISO
    description: >
      Telnet (TCP/23) must be disabled and unavailable on every network
      device. No management access via Telnet is permitted under any
      circumstances, including break-glass scenarios. Break-glass
      access must use SSH to the console server or direct console cable.
    rationale: >
      Telnet transmits credentials and session data in clear text.
      In a regulated financial environment, any use of Telnet for
      network device management is a material security control failure.
      All regulatory frameworks examined require encrypted management
      access. Telnet is also frequently cited in penetration test
      findings and regulatory inspection reports.
    regulatory_refs:
      - framework: fca
        reference: "FCA SYSC 13.9 — Information security controls"
        obligation: "Encrypted communications for all management access"
      - framework: bafin
        reference: "BAIT Section 8.3 — Access controls"
        obligation: "Encrypted protocols for all administrative access"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-011]

  - id: REQ-018
    title: "SSH version 2 must be the only permitted remote access protocol"
    category: compliance_controls
    priority: critical
    owner: CISO
    description: >
      SSH version 2 must be configured as the sole remote access
      protocol on all network devices. SSH version 1 must be explicitly
      disabled. Host keys must be RSA 4096-bit or ECDSA 256-bit minimum.
      Interactive and programmatic access (Ansible, NAPALM) must both
      use SSHv2. HTTPS/API access is permitted in addition to SSH where
      the platform supports it.
    rationale: >
      SSHv1 contains known cryptographic weaknesses including the
      MITM vulnerability (CVE-2001-0572 and related). All financial
      services security frameworks require only SSHv2. SSHv1 is
      prohibited under PCI-DSS (which applies to any infrastructure
      handling card-holder data) and is considered a baseline
      security failure by FCA and BaFin inspectors.
    regulatory_refs:
      - framework: fca
        reference: "FCA SYSC 13.9"
        obligation: "Appropriate encryption on management channels"
      - framework: mas
        reference: "MAS Cyber Hygiene Notice — Secure remote access"
        obligation: "Only approved SSH versions permitted"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-011]
    sot_enforcement:
      - "sot/global/platform_defaults.yml — SSH configuration in base template"

  - id: REQ-019
    title: "SNMP version 3 with authentication and privacy must be used — no SNMPv1/v2c"
    category: compliance_controls
    priority: high
    owner: CISO
    description: >
      All SNMP-based monitoring must use SNMPv3 with authentication
      (SHA) and privacy (AES128 minimum) configured. SNMPv1 and SNMPv2c
      community strings are prohibited. SNMP community strings transmit
      in clear text and provide read (and potentially write) access to
      device MIBs. SNMP source interface must be the loopback address.
    rationale: >
      SNMPv1 and v2c use community strings transmitted in clear text,
      making them vulnerable to interception and replay. An attacker
      with SNMP write access could modify device configuration. SNMPv3
      provides message integrity, authentication, and encryption,
      consistent with the encrypted-management-access requirement in
      REQ-018.
    regulatory_refs:
      - framework: fca
        reference: "FCA SYSC 13.9"
        obligation: "Encrypted and authenticated management protocols"
      - framework: bafin
        reference: "BAIT Section 8.3 — Network monitoring controls"
        obligation: "Secure protocols for network monitoring"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: all_devices
    design_intents: [INTENT-011]
    sot_enforcement:
      - "sot/global/platform_defaults.yml — snmp.version: v3 (both arista_eos and frr)"
      - "sot/global/snmp.yml — SNMPv3 user definitions"

  # ────────────────────────────────────────────────────────────────────
  # CATEGORY: Resilience & Availability
  # Financial services firms are required to maintain high availability
  # of systems supporting regulated activities. Network resilience is
  # a direct input to the firm's operational resilience framework.
  # ────────────────────────────────────────────────────────────────────

  - id: REQ-020
    title: "Each data centre must survive the failure of a single spine switch"
    category: resilience
    priority: critical
    owner: Head-Infra
    description: >
      Every DC fabric must have a minimum of two spine switches. Every
      leaf switch must be connected to both spines with equal-cost
      multi-path (ECMP) routing. Loss of any single spine switch must
      not result in loss of connectivity for any leaf or border router
      in that DC. Recovery (BGP reconvergence + BFD detection) must
      complete within 30 seconds of spine failure.
    rationale: >
      The FCA PS21/3 operational resilience policy requires firms to
      define impact tolerances for important business services (IBS)
      and to demonstrate that infrastructure can tolerate component
      failures within those tolerances. Trading connectivity is an IBS
      for ACME. A single spine failure must not breach the trading
      system availability SLA (99.999% — Reg SCI).
    regulatory_refs:
      - framework: fca
        reference: "FCA PS21/3 — Operational resilience"
        obligation: "Firms must identify IBS and remain within impact tolerances during disruptions"
      - framework: sec
        reference: "SEC Reg SCI 242.1001(a)(2)(v)"
        obligation: "Business continuity and disaster recovery plans; 99.999% availability SLA"
      - framework: mas
        reference: "MAS TRM 6.2 — System availability"
        obligation: "Critical systems must achieve agreed availability targets"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: [spine, leaf, border]
    design_intents: [INTENT-008]
    sot_enforcement:
      - "Each DC site has two spine devices (e.g., spine-lon-01 and spine-lon-02)"
      - "Each leaf has Ethernet1→spine-01 and Ethernet2→spine-02 in device files"
      - "sot/global/platform_defaults.yml — bgp_defaults.maximum_paths: 4"

  - id: REQ-021
    title: "Border routers must have at least two independent WAN paths to peer regions"
    category: resilience
    priority: critical
    owner: Head-Infra
    description: >
      Every active DC border router must maintain at least two physically
      diverse WAN connections — via different carriers where possible —
      to its peer regions. Failure of a single WAN circuit must not
      cause loss of inter-region connectivity. London (emea-lon) is the
      hub region and must maintain WAN paths to all other regions (NYC,
      SIN, FRA). Recovery on WAN circuit failure must complete within
      60 seconds.
    rationale: >
      Inter-region routing carries cross-border order flow and market
      data. Loss of all WAN paths from any DC would isolate that DC's
      users from global trading systems, breaching the Reg SCI 99.999%
      availability requirement and FCA PS21/3 impact tolerances. Dual
      WAN paths with different carriers provide protection against both
      circuit failure and carrier outages.
    regulatory_refs:
      - framework: sec
        reference: "SEC Reg SCI 242.1001 — Business continuity"
        obligation: "Backup systems and redundant network connectivity"
      - framework: fca
        reference: "FCA PS21/3 — Operational resilience"
        obligation: "Resilience within impact tolerances — single points of failure not acceptable"
    regions: [emea-lon, americas-nyc, apac, eu-fra]
    applies_to: [border]
    design_intents: [INTENT-008]
    sot_enforcement:
      - "border-lon-01: Ethernet3→NYC, Ethernet4→SIN, Ethernet5→FRA — three WAN interfaces"
      - "BFD enabled on all WAN-facing BGP sessions for fast failure detection"

