---
# sot/bgp/prefix_baselines.yml
#
# BGP prefix count baselines for the bgp_prefix_monitor playbook.
# These values represent the expected prefix counts per peer under
# normal operating conditions.
#
# A drop below (baseline - tolerance) triggers an alert.
# Tolerance is expressed as a number of prefixes (not a percentage) to
# avoid false positives when prefix counts are naturally small.
#
# Intent ref: INTENT-005 (BGP standards), REQ-021 (WAN redundancy)

prefix_baselines:

  # border-lon-01 WAN sessions — regional aggregates only (INTENT-006)
  - node: border-lon-01
    peer: 10.0.1.1       # border-nyc-01
    peer_asn: 65010
    peer_description: "NYC DC1 eBGP"
    expected_prefixes: 2  # 10.10.0.0/16 (NYC DC) + 10.101.0.0/16 (US branches)
    tolerance: 0          # any drop is significant — only 2 prefixes expected

  - node: border-lon-01
    peer: 10.0.2.1       # border-sin-01
    peer_asn: 65020
    peer_description: "SIN DC1 eBGP"
    expected_prefixes: 1  # 10.20.0.0/16 (SIN DC)
    tolerance: 0

  - node: border-lon-01
    peer: 10.0.3.1       # border-fra-01
    peer_asn: 65030
    peer_description: "FRA DC1 eBGP (EU regulatory)"
    expected_prefixes: 1  # 10.30.0.0/16 (FRA DC) — TRADING prefix must never appear
    tolerance: 0

  - node: border-lon-01
    peer: 10.100.0.1     # branch-lon-01
    peer_asn: 65100
    peer_description: "UK branch LON-01 eBGP"
    expected_prefixes: 1  # 10.100.0.0/29 assigned prefix only
    tolerance: 0

  # border-nyc-01 — receives LON aggregate + LON branches
  - node: border-nyc-01
    peer: 10.0.1.0       # border-lon-01
    peer_asn: 65001
    peer_description: "LON DC1 eBGP"
    expected_prefixes: 2  # 10.1.0.0/16 (LON DC) + 10.100.0.0/16 (UK branches)
    tolerance: 0

  - node: border-nyc-01
    peer: 10.101.0.1     # branch-nyc-01
    peer_asn: 65120
    peer_description: "US branch NYC-01 eBGP"
    expected_prefixes: 1  # 10.101.0.0/29 assigned prefix only
    tolerance: 0

  # border-sin-01 — receives LON aggregate
  - node: border-sin-01
    peer: 10.0.2.0       # border-lon-01
    peer_asn: 65001
    peer_description: "LON DC1 eBGP"
    expected_prefixes: 2  # 10.1.0.0/16 (LON DC) + 10.100.0.0/16 (UK branches)
    tolerance: 0

  # border-fra-01 — receives LON aggregate ONLY; must never see TRADING prefix
  - node: border-fra-01
    peer: 10.0.3.0       # border-lon-01
    peer_asn: 65001
    peer_description: "LON DC1 eBGP (ring-fenced)"
    expected_prefixes: 1  # 10.1.0.0/16 only (LON DC supernet); TRADING /24 must be suppressed
    tolerance: 0
    compliance_note: >
      border-fra-01 must never receive 10.1.1.0/24 (TRADING prefix).
      If expected_prefixes ever increases from 1, investigate immediately (INTENT-003).
