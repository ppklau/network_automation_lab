---
# ACME Investments — Site: London DC1
# Primary HQ data centre — fully instantiated in containerlab
# Last reviewed: 2026-03-01

site:
  name: "London Data Centre 1"
  code: lon-dc1
  short_code: lon1
  region: emea-lon
  address: "Canary Wharf, London E14, United Kingdom"
  country: UK
  tier: "Tier IV"
  lab_instantiated: true

  physical:
    floor_space_sqm: 1500
    total_racks: 120
    power_kw: 2400
    cooling: "N+1 chilled water"
    connectivity_providers: ["Equinix Fabric", "BT Openreach", "Zayo"]

  network_os_primary: arista_eos
  asn: 65001
  supernet: 10.1.0.0/16
  device_count: 8   # lab instantiated; real: ~30 per DC in production

  # ──────────────────────────────────────────
  # VLANs defined at this site
  # ──────────────────────────────────────────
  vlans:
    - vlan_id: 100
      name: TRADING
      vrf: TRADING_VRF
      prefix: 10.1.1.0/24
      gateway_vip: 10.1.1.1
      description: "Equities and FX trading systems"
      zone: TRADING
      active: true

    - vlan_id: 200
      name: CORPORATE
      vrf: CORPORATE_VRF
      prefix: 10.1.2.0/22
      gateway_vip: 10.1.2.1
      description: "Corporate workstations and internal servers"
      zone: CORPORATE
      active: true

    - vlan_id: 300
      name: DMZ
      vrf: DMZ_VRF
      prefix: 10.1.6.0/24
      gateway_vip: 10.1.6.1
      description: "DMZ — internet-facing and partner connectivity"
      zone: DMZ
      active: true

    - vlan_id: 400
      name: MGMT
      vrf: MGMT_VRF
      prefix: 10.1.0.0/25
      gateway_vip: 10.1.0.126
      description: "Network device management"
      zone: MGMT_ZONE
      active: true

  # ──────────────────────────────────────────
  # Zone permissions at this site
  # ──────────────────────────────────────────
  zone_permissions:
    TRADING:    true
    CORPORATE:  true
    DMZ:        true
    MGMT_ZONE:  true

  # ──────────────────────────────────────────
  # Subnets
  # ──────────────────────────────────────────
  subnets:
    management:     10.1.0.0/25
    loopbacks:      10.1.255.0/24
    fabric_p2p:     10.1.100.0/24
    trading_svi:    10.1.1.0/24
    corporate_svi:  10.1.2.0/22
    dmz_svi:        10.1.6.0/24
    mgmt_svi:       10.1.0.0/25

  # ──────────────────────────────────────────
  # Management IPs
  # ──────────────────────────────────────────
  management_ips:
    spine-lon-01:   10.1.0.1
    spine-lon-02:   10.1.0.2
    leaf-lon-01:    10.1.0.11
    leaf-lon-02:    10.1.0.12
    leaf-lon-03:    10.1.0.13
    leaf-lon-04:    10.1.0.14
    border-lon-01:  10.1.0.20
    fw-lon-01:      10.1.0.30

  devices:
    - hostname: spine-lon-01
      role: spine
      platform: arista_eos
      lab_state: active

    - hostname: spine-lon-02
      role: spine
      platform: arista_eos
      lab_state: active

    - hostname: leaf-lon-01
      role: leaf
      platform: arista_eos
      lab_state: active

    - hostname: leaf-lon-02
      role: leaf
      platform: arista_eos
      lab_state: active

    - hostname: leaf-lon-03
      role: leaf
      platform: arista_eos
      lab_state: active

    - hostname: leaf-lon-04
      role: leaf
      platform: arista_eos
      lab_state: active

    - hostname: border-lon-01
      role: border
      platform: arista_eos
      lab_state: active

    - hostname: fw-lon-01
      role: firewall
      platform: frr
      lab_state: active

  compliance_tags: [mifid2, fca, gdpr_applicable, uk_gdpr]
  data_residency: UK
