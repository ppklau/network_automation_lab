# ACME Investments — IP Address Management (IPAM)
# Supernet: 10.0.0.0/8  (RFC 1918 private)
# Managed by: Network Engineering / IPAM team
# Last reviewed: 2026-03-01

supernet: 10.0.0.0/8

# ──────────────────────────────────────────────────────────────
# Inter-Region WAN Links  (10.0.0.0/16)
# /31 point-to-point between border routers
# ──────────────────────────────────────────────────────────────
wan_links:
  supernet: 10.0.0.0/16

  links:
    - name: lon-nyc
      prefix: 10.0.1.0/31
      endpoints:
        - device: border-lon-01
          ip: 10.0.1.0/31
          side: london
        - device: border-nyc-01
          ip: 10.0.1.1/31
          side: new_york
      ebgp_peers:
        lon_asn: 65001
        nyc_asn: 65010

    - name: lon-sin
      prefix: 10.0.2.0/31
      endpoints:
        - device: border-lon-01
          ip: 10.0.2.0/31
          side: london
        - device: border-sin-01
          ip: 10.0.2.1/31
          side: singapore
      ebgp_peers:
        lon_asn: 65001
        sin_asn: 65020

    - name: lon-fra
      prefix: 10.0.3.0/31
      endpoints:
        - device: border-lon-01
          ip: 10.0.3.0/31
          side: london
        - device: border-fra-01
          ip: 10.0.3.1/31
          side: frankfurt
      ebgp_peers:
        lon_asn: 65001
        fra_asn: 65030

    - name: lon-dc1-lon-dc2
      prefix: 10.0.4.0/31
      description: "Intra-London inter-DC link"
      endpoints:
        - device: border-lon-01
          ip: 10.0.4.0/31
          side: lon-dc1
        - device: border-lon2-01
          ip: 10.0.4.1/31
          side: lon-dc2
      ebgp_peers:
        lon_dc1_asn: 65001
        lon_dc2_asn: 65002

    - name: nyc-dc1-nyc-dc2
      prefix: 10.0.5.0/31
      description: "Intra-NYC inter-DC link"
      endpoints:
        - device: border-nyc-01
          ip: 10.0.5.0/31
          side: nyc-dc1
        - device: border-nyc2-01
          ip: 10.0.5.1/31
          side: nyc-dc2
      ebgp_peers:
        nyc_dc1_asn: 65010
        nyc_dc2_asn: 65011

    - name: sin-hkg
      prefix: 10.0.6.0/31
      description: "APAC inter-DC link"
      endpoints:
        - device: border-sin-01
          ip: 10.0.6.0/31
          side: singapore
        - device: border-hkg-01
          ip: 10.0.6.1/31
          side: hong_kong
      ebgp_peers:
        sin_asn: 65020
        hkg_asn: 65021

