---
# ACME Investments — Device: leaf-lon-03
# Role: Leaf switch / BGP RR client — London DC1
# VRRP active for DMZ VLAN 300 (priority 110)
# VRRP standby for MGMT VLAN 400 (priority 80)
# Also provides TRADING standby (priority 80) and CORPORATE standby (priority 80)
# Platform: Arista cEOS
# Lab state: active
# Last reviewed: 2026-03-01

hostname: leaf-lon-03
fqdn: leaf-lon-03.lon-dc1.acme-investments.internal
role: leaf
platform: arista_eos
image: ceos:4.32.2F
hardware_model: DCS-7050TX3-48C8
device_serial: ACE2401013B
eol_date: "2029-06-30"

site: lon-dc1
region: emea-lon
lab_state: active

compliance_tags: [mifid2, fca, gdpr_applicable, uk_gdpr]
security_zones: [TRADING, CORPORATE, DMZ, MGMT_ZONE]
intent_refs: [INTENT-001, INTENT-002, INTENT-005, INTENT-008, INTENT-011]

management:
  interface: Management0
  ip: 10.1.0.13/25
  gateway: 10.1.0.126
  vrf: MGMT

loopback:
  interface: Loopback0
  ip: 10.1.255.13/32
  description: Router-ID and BGP next-hop

ntp_source_interface: Loopback0
logging_source_interface: Loopback0
snmp_source_interface: Loopback0

vrfs:
  - name: MGMT
    description: Out-of-band management
    rd: 65001:999
  - name: TRADING_VRF
    description: Equities/FX trading systems
    rd: 65001:100
    route_target_import: 65001:100
    route_target_export: 65001:100
  - name: CORPORATE_VRF
    description: Corporate workstations and servers
    rd: 65001:200
    route_target_import: 65001:200
    route_target_export: 65001:200
  - name: DMZ_VRF
    description: DMZ — internet-facing and partner connectivity
    rd: 65001:300
    route_target_import: 65001:300
    route_target_export: 65001:300
  - name: MGMT_VRF
    description: Network device management data plane
    rd: 65001:400
    route_target_import: 65001:400
    route_target_export: 65001:400

vlans:
  - vlan_id: 100
    name: TRADING
    vrf: TRADING_VRF
    svi_ip: 10.1.1.4/24       # leaf-lon-03 SVI; VIP is .1 (active on leaf-lon-01)
    active: true

  - vlan_id: 200
    name: CORPORATE
    vrf: CORPORATE_VRF
    svi_ip: 10.1.2.5/22
    active: true

  - vlan_id: 300
    name: DMZ
    vrf: DMZ_VRF
    svi_ip: 10.1.6.2/24       # leaf-lon-03 SVI; VIP is .1 (ACTIVE here)
    active: true

  - vlan_id: 400
    name: MGMT
    vrf: MGMT_VRF
    svi_ip: 10.1.0.5/25
    active: true

interfaces:
  - name: Ethernet1
    description: P2P -> spine-lon-01 Ethernet3 [fabric]
    ip: 10.1.100.5/31         # leaf=.5, spine=.4
    peer_device: spine-lon-01
    peer_interface: Ethernet3
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet2
    description: P2P -> spine-lon-02 Ethernet3 [fabric]
    ip: 10.1.100.13/31        # leaf=.13, spine=.12
    peer_device: spine-lon-02
    peer_interface: Ethernet3
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet3
    description: Server access port — DMZ VLAN 300
    mode: access
    access_vlan: 300
    peer_device: srv-dmz-01
    peer_interface: eth0
    mtu: 9214
    speed: 10G

  - name: Ethernet4
    description: Server access port — DMZ VLAN 300
    mode: access
    access_vlan: 300
    peer_device: srv-dmz-02
    peer_interface: eth0
    mtu: 9214
    speed: 10G

  - name: Ethernet5
    description: fw-lon-01 internal facing eth2 (leaf-lon-03 -> FW)
    mode: access
    access_vlan: 300           # DMZ traffic towards firewall internal interface
    peer_device: fw-lon-01
    peer_interface: eth2
    mtu: 9214
    speed: 10G

  - name: Ethernet6
    description: Server trunk — CORPORATE VLAN 200
    mode: access
    access_vlan: 200
    peer_device: srv-corp-05
    peer_interface: eth0
    mtu: 9214
    speed: 10G

  - name: Vlan100
    description: SVI TRADING — leaf-lon-03 standby
    ip: 10.1.1.4/24
    vrf: TRADING_VRF
    vrrp_group: 10

  - name: Vlan200
    description: SVI CORPORATE — leaf-lon-03 standby
    ip: 10.1.2.5/22
    vrf: CORPORATE_VRF
    vrrp_group: 20

  - name: Vlan300
    description: SVI DMZ — leaf-lon-03 ACTIVE gateway
    ip: 10.1.6.2/24
    vrf: DMZ_VRF
    vrrp_group: 30

  - name: Vlan400
    description: SVI MGMT — leaf-lon-03 standby
    ip: 10.1.0.5/25
    vrf: MGMT_VRF
    vrrp_group: 40

  - name: Loopback0
    description: Router-ID / BGP next-hop
    ip: 10.1.255.13/32
    vrf: default

  - name: Management0
    description: OOB management
    ip: 10.1.0.13/25
    vrf: MGMT

vrrp:
  - group: 10
    vlan: 100
    vrf: TRADING_VRF
    virtual_ip: 10.1.1.1
    priority: 80              # leaf-lon-01=110(active), leaf-lon-02=90(standby), leaf-lon-03=80
    preempt: true
    preempt_delay_seconds: 60

  - group: 20
    vlan: 200
    vrf: CORPORATE_VRF
    virtual_ip: 10.1.2.1
    priority: 80              # leaf-lon-02=110(active), leaf-lon-01=90(standby), leaf-lon-03=80
    preempt: true
    preempt_delay_seconds: 60

  - group: 30
    vlan: 300
    vrf: DMZ_VRF
    virtual_ip: 10.1.6.1
    priority: 110             # ACTIVE for DMZ on leaf-lon-03
    preempt: true
    preempt_delay_seconds: 60
    advertisement_interval_ms: 1000
    track:
      - interface: Ethernet1
        decrement: 20
      - interface: Ethernet2
        decrement: 20

  - group: 40
    vlan: 400
    vrf: MGMT_VRF
    virtual_ip: 10.1.0.126
    priority: 90              # STANDBY for MGMT — leaf-lon-04 is active
    preempt: true
    preempt_delay_seconds: 60

# ──────────────────────────────────────────
# OSPF Configuration (underlay IGP)
# ──────────────────────────────────────────
ospf:
  process_id: 1
  router_id: 10.1.255.13
  area: 0.0.0.0
  fabric_interfaces:
    - Ethernet1   # P2P -> spine-lon-01
    - Ethernet2   # P2P -> spine-lon-02

# Static Routes
# Force TRADING-zone DMZ-bound traffic through fw-lon-01 (INTENT-002, REQ-008).
# fw-lon-01 eth2 (10.1.1.254/24) connects directly to this leaf (Ethernet5).
static_routes:
  - vrf: TRADING_VRF
    prefix: 10.1.6.0/24
    next_hop: 10.1.1.254
    description: "DMZ via fw-lon-01 TRADING interface — firewall enforced (INTENT-002)"

bgp:
  local_as: 65001
  router_id: 10.1.255.13
  role: rr_client

  neighbors:
    - peer_ip: 10.1.255.1
      remote_as: 65001
      description: iBGP RR -> spine-lon-01
      update_source: Loopback0
      route_reflector_client: false
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

    - peer_ip: 10.1.255.2
      remote_as: 65001
      description: iBGP RR -> spine-lon-02
      update_source: Loopback0
      route_reflector_client: false
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

  networks_advertised:
    - prefix: 10.1.255.13/32
      description: Loopback
    - prefix: 10.1.1.0/24
      description: TRADING SVI
      vrf: TRADING_VRF
    - prefix: 10.1.2.0/22
      description: CORPORATE SVI
      vrf: CORPORATE_VRF
    - prefix: 10.1.6.0/24
      description: DMZ SVI
      vrf: DMZ_VRF
    - prefix: 10.1.0.0/25
      description: MGMT SVI
      vrf: MGMT_VRF

  timers:
    keepalive: 30
    hold_time: 90

  graceful_restart: true
  log_neighbor_changes: true
