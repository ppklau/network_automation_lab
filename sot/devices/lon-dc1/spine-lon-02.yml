---
# ACME Investments — Device: spine-lon-02
# Role: Spine switch / BGP Route Reflector — London DC1
# Platform: Arista cEOS
# Lab state: active (fully instantiated in containerlab)
# Last reviewed: 2026-03-01

hostname: spine-lon-02
fqdn: spine-lon-02.lon-dc1.acme-investments.internal
role: spine
platform: arista_eos
image: ceos:4.32.2F
hardware_model: DCS-7050CX3-32S
device_serial: ACE2401002A
eol_date: "2029-12-31"

site: lon-dc1
region: emea-lon
lab_state: active

compliance_tags: [mifid2, fca, gdpr_applicable, uk_gdpr]
security_zones: [MGMT_ZONE]
intent_refs: [INTENT-005, INTENT-008, INTENT-011]

management:
  interface: Management0
  ip: 10.1.0.2/25
  gateway: 10.1.0.126
  vrf: MGMT

loopback:
  interface: Loopback0
  ip: 10.1.255.2/32
  description: Router-ID and BGP next-hop

ntp_source_interface: Loopback0
logging_source_interface: Loopback0
snmp_source_interface: Loopback0

vrfs:
  - name: MGMT
    description: Out-of-band management VRF
    rd: 65001:999

interfaces:
  - name: Ethernet1
    description: P2P -> leaf-lon-01 Ethernet2 [fabric]
    ip: 10.1.100.8/31       # spine=.8, leaf=.9
    peer_device: leaf-lon-01
    peer_interface: Ethernet2
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet2
    description: P2P -> leaf-lon-02 Ethernet2 [fabric]
    ip: 10.1.100.10/31      # spine=.10, leaf=.11
    peer_device: leaf-lon-02
    peer_interface: Ethernet2
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet3
    description: P2P -> leaf-lon-03 Ethernet2 [fabric]
    ip: 10.1.100.12/31      # spine=.12, leaf=.13
    peer_device: leaf-lon-03
    peer_interface: Ethernet2
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet4
    description: P2P -> leaf-lon-04 Ethernet2 [fabric]
    ip: 10.1.100.14/31      # spine=.14, leaf=.15
    peer_device: leaf-lon-04
    peer_interface: Ethernet2
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet5
    description: P2P -> border-lon-01 Ethernet2 [fabric]
    ip: 10.1.100.18/31      # spine=.18, border=.19
    peer_device: border-lon-01
    peer_interface: Ethernet2
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Loopback0
    description: Router-ID / BGP next-hop
    ip: 10.1.255.2/32
    vrf: default

  - name: Management0
    description: OOB management
    ip: 10.1.0.2/25
    vrf: MGMT

# ──────────────────────────────────────────
# OSPF Configuration (underlay IGP)
# ──────────────────────────────────────────
ospf:
  process_id: 1
  router_id: 10.1.255.2
  area: 0.0.0.0
  fabric_interfaces:
    - Ethernet1   # P2P -> leaf-lon-01
    - Ethernet2   # P2P -> leaf-lon-02
    - Ethernet3   # P2P -> leaf-lon-03
    - Ethernet4   # P2P -> leaf-lon-04
    - Ethernet5   # P2P -> border-lon-01

bgp:
  local_as: 65001
  router_id: 10.1.255.2
  role: route_reflector

  neighbors:
    - peer_ip: 10.1.255.1
      remote_as: 65001
      description: iBGP peer -> spine-lon-01 (non-RR-client peer between RRs)
      update_source: Loopback0
      route_reflector_client: false
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

    - peer_ip: 10.1.255.11
      remote_as: 65001
      description: iBGP RR client -> leaf-lon-01
      update_source: Loopback0
      route_reflector_client: true
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

    - peer_ip: 10.1.255.12
      remote_as: 65001
      description: iBGP RR client -> leaf-lon-02
      update_source: Loopback0
      route_reflector_client: true
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

    - peer_ip: 10.1.255.13
      remote_as: 65001
      description: iBGP RR client -> leaf-lon-03
      update_source: Loopback0
      route_reflector_client: true
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

    - peer_ip: 10.1.255.14
      remote_as: 65001
      description: iBGP RR client -> leaf-lon-04
      update_source: Loopback0
      route_reflector_client: true
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

    - peer_ip: 10.1.255.20
      remote_as: 65001
      description: iBGP RR client -> border-lon-01
      update_source: Loopback0
      route_reflector_client: true
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

  networks_advertised:
    - prefix: 10.1.255.2/32
      description: Loopback

  timers:
    keepalive: 30
    hold_time: 90

  graceful_restart: true
  log_neighbor_changes: true
