---
# ACME Investments — Device: leaf-lon-01
# Role: Leaf switch / BGP RR client — London DC1
# VRRP active for TRADING VLAN 100 (priority 110)
# VRRP standby for CORPORATE VLAN 200 (priority 90)
# Platform: Arista cEOS
# Lab state: active
# Last reviewed: 2026-03-01

hostname: leaf-lon-01
fqdn: leaf-lon-01.lon-dc1.acme-investments.internal
role: leaf
platform: arista_eos
image: ceos:4.32.2F
hardware_model: DCS-7050TX3-48C8
device_serial: ACE2401011B
eol_date: "2029-06-30"

site: lon-dc1
region: emea-lon
lab_state: active

compliance_tags: [mifid2, fca, gdpr_applicable, uk_gdpr]
security_zones: [TRADING, CORPORATE, MGMT_ZONE]
intent_refs: [INTENT-001, INTENT-002, INTENT-005, INTENT-008, INTENT-011]

management:
  interface: Management0
  ip: 10.1.0.11/25
  gateway: 10.1.0.126
  vrf: MGMT

loopback:
  interface: Loopback0
  ip: 10.1.255.11/32
  description: Router-ID and BGP next-hop

ntp_source_interface: Loopback0
logging_source_interface: Loopback0
snmp_source_interface: Loopback0

# ──────────────────────────────────────────
# VRFs
# ──────────────────────────────────────────
vrfs:
  - name: MGMT
    description: Out-of-band management
    rd: 65001:999
  - name: TRADING_VRF
    description: Equities/FX trading systems
    rd: 65001:100
    route_target_import: 65001:100
    route_target_export: 65001:100
  - name: CORPORATE_VRF
    description: Corporate workstations and servers
    rd: 65001:200
    route_target_import: 65001:200
    route_target_export: 65001:200
  - name: MGMT_VRF
    description: Network device management data plane
    rd: 65001:400
    route_target_import: 65001:400
    route_target_export: 65001:400

# ──────────────────────────────────────────
# VLANs
# ──────────────────────────────────────────
vlans:
  - vlan_id: 100
    name: TRADING
    vrf: TRADING_VRF
    svi_ip: 10.1.1.2/24       # leaf-lon-01 SVI (.2; VIP is .1)
    active: true

  - vlan_id: 200
    name: CORPORATE
    vrf: CORPORATE_VRF
    svi_ip: 10.1.2.3/22       # leaf-lon-01 SVI (.3; VIP is .1)
    active: true

  - vlan_id: 400
    name: MGMT
    vrf: MGMT_VRF
    svi_ip: 10.1.0.3/25       # leaf-lon-01 MGMT SVI
    active: true

# ──────────────────────────────────────────
# Interfaces
# ──────────────────────────────────────────
interfaces:
  - name: Ethernet1
    description: P2P -> spine-lon-01 Ethernet1 [fabric]
    ip: 10.1.100.1/31         # leaf=.1, spine=.0
    peer_device: spine-lon-01
    peer_interface: Ethernet1
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet2
    description: P2P -> spine-lon-02 Ethernet1 [fabric]
    ip: 10.1.100.9/31         # leaf=.9, spine=.8
    peer_device: spine-lon-02
    peer_interface: Ethernet1
    mtu: 9214
    speed: 100G
    vrf: default

  - name: Ethernet3
    description: Server access port — TRADING VLAN 100
    mode: access
    access_vlan: 100
    peer_device: srv-trading-01   # production server — not in lab
    peer_interface: eth0
    mtu: 9214
    speed: 10G
    vrf: TRADING_VRF

  - name: Ethernet4
    description: Server access port — TRADING VLAN 100 (redundant NIC)
    mode: access
    access_vlan: 100
    peer_device: srv-trading-02
    peer_interface: eth0
    mtu: 9214
    speed: 10G
    vrf: TRADING_VRF

  - name: Ethernet5
    description: Server trunk port — CORPORATE+MGMT (VLANs 200,400)
    mode: trunk
    trunk_vlans: [200, 400]
    peer_device: srv-corp-01
    peer_interface: eth0
    mtu: 9214
    speed: 10G

  - name: Ethernet6
    description: Server trunk port — CORPORATE+MGMT (VLANs 200,400)
    mode: trunk
    trunk_vlans: [200, 400]
    peer_device: srv-corp-02
    peer_interface: eth0
    mtu: 9214
    speed: 10G

  - name: Vlan100
    description: SVI TRADING — leaf-lon-01 gateway
    ip: 10.1.1.2/24
    vrf: TRADING_VRF
    vrrp_group: 10

  - name: Vlan200
    description: SVI CORPORATE — leaf-lon-01 gateway
    ip: 10.1.2.3/22
    vrf: CORPORATE_VRF
    vrrp_group: 20

  - name: Vlan400
    description: SVI MGMT — leaf-lon-01 gateway
    ip: 10.1.0.3/25
    vrf: MGMT_VRF
    vrrp_group: 40

  - name: Loopback0
    description: Router-ID / BGP next-hop
    ip: 10.1.255.11/32
    vrf: default

  - name: Management0
    description: OOB management
    ip: 10.1.0.11/25
    vrf: MGMT

# ──────────────────────────────────────────
# VRRP Groups
# VLAN 100 TRADING:   leaf-lon-01 = ACTIVE  (priority 110)
# VLAN 200 CORPORATE: leaf-lon-01 = STANDBY (priority 90) — leaf-lon-02 is active
# VLAN 400 MGMT:      leaf-lon-01 = STANDBY (priority 80) — leaf-lon-04 is active
# ──────────────────────────────────────────
vrrp:
  - group: 10
    vlan: 100
    vrf: TRADING_VRF
    virtual_ip: 10.1.1.1
    priority: 110             # ACTIVE for TRADING on leaf-lon-01
    preempt: true
    preempt_delay_seconds: 60
    advertisement_interval_ms: 1000
    track:
      - interface: Ethernet1
        decrement: 20         # if uplink to spine-01 fails, drop priority to 90 (standby)
      - interface: Ethernet2
        decrement: 20

  - group: 20
    vlan: 200
    vrf: CORPORATE_VRF
    virtual_ip: 10.1.2.1
    priority: 90              # STANDBY for CORPORATE — leaf-lon-02 is active (110)
    preempt: true
    preempt_delay_seconds: 60
    advertisement_interval_ms: 1000

  - group: 40
    vlan: 400
    vrf: MGMT_VRF
    virtual_ip: 10.1.0.126
    priority: 80              # Lower priority — leaf-lon-04 is active for MGMT
    preempt: true
    preempt_delay_seconds: 60

# ──────────────────────────────────────────
# OSPF Configuration (underlay IGP)
# ──────────────────────────────────────────
ospf:
  process_id: 1
  router_id: 10.1.255.11
  area: "0.0.0.0"
  fabric_interfaces:
    - Ethernet1   # P2P -> spine-lon-01
    - Ethernet2   # P2P -> spine-lon-02

# ──────────────────────────────────────────
# BGP Configuration
# ──────────────────────────────────────────
bgp:
  local_as: 65001
  router_id: 10.1.255.11
  role: rr_client

  neighbors:
    - peer_ip: 10.1.255.1
      remote_as: 65001
      description: iBGP RR -> spine-lon-01
      update_source: Loopback0
      route_reflector_client: false
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

    - peer_ip: 10.1.255.2
      remote_as: 65001
      description: iBGP RR -> spine-lon-02
      update_source: Loopback0
      route_reflector_client: false
      md5_password_ref: bgp_md5_lon_dc1_fabric
      address_families:
        - afi: ipv4
          safi: unicast
          activate: true

  networks_advertised:
    - prefix: 10.1.255.11/32
      description: Loopback
    - prefix: 10.1.1.0/24
      description: TRADING SVI
      vrf: TRADING_VRF
    - prefix: 10.1.2.0/22
      description: CORPORATE SVI
      vrf: CORPORATE_VRF
    - prefix: 10.1.0.0/25
      description: MGMT SVI
      vrf: MGMT_VRF

  timers:
    keepalive: 30
    hold_time: 90

  graceful_restart: true
  log_neighbor_changes: true
