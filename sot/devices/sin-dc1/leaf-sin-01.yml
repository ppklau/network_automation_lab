---
# ACME Investments — Device: leaf-sin-01
# Role: Leaf / RR client — SIN DC1
# lab_state: sot_only
# Last reviewed: 2026-03-01

hostname: leaf-sin-01
fqdn: leaf-sin-01.sin-dc1.acme-investments.internal
role: leaf
platform: arista_eos
image: ceos:4.32.2F
hardware_model: DCS-7050TX3-48C8
serial: ACE2420011B
eol_date: "2029-06-30"
lab_state: sot_only

site: sin-dc1
region: apac
compliance_tags: [mas_trm, hkma_cfi, apac_data_residency]
security_zones: [TRADING, CORPORATE, MGMT_ZONE]

management:
  interface: Management0
  ip: 10.20.0.11/25
  gateway: 10.20.0.126
  vrf: MGMT

loopback:
  interface: Loopback0
  ip: 10.20.255.11/32

vlans:
  - vlan_id: 100
    name: TRADING
    vrf: TRADING_VRF
    svi_ip: 10.20.1.2/24
    active: true
  - vlan_id: 200
    name: CORPORATE
    vrf: CORPORATE_VRF
    svi_ip: 10.20.2.3/22
    active: true
  - vlan_id: 400
    name: MGMT
    vrf: MGMT_VRF
    svi_ip: 10.20.0.3/25
    active: true

interfaces:
  - name: Ethernet1
    description: "P2P -> spine-sin-01 Ethernet1"
    ip: 10.20.100.1/31
    peer_device: spine-sin-01
    peer_interface: Ethernet1
    mtu: 9214
  - name: Ethernet2
    description: "P2P -> spine-sin-02 Ethernet1"
    ip: 10.20.100.9/31
    peer_device: spine-sin-02
    peer_interface: Ethernet1
    mtu: 9214
  - name: Ethernet3
    description: "Server access — TRADING VLAN 100"
    mode: access
    access_vlan: 100
    mtu: 9214
  - name: Ethernet4
    description: "Server trunk — CORPORATE+MGMT"
    mode: trunk
    trunk_vlans: [200, 400]
    mtu: 9214

vrrp:
  - group: 10
    vlan: 100
    vrf: TRADING_VRF
    virtual_ip: 10.20.1.1
    priority: 110
    preempt: true
  - group: 20
    vlan: 200
    vrf: CORPORATE_VRF
    virtual_ip: 10.20.2.1
    priority: 90
    preempt: true
  - group: 40
    vlan: 400
    vrf: MGMT_VRF
    virtual_ip: 10.20.0.126
    priority: 80
    preempt: true

bgp:
  local_as: 65020
  router_id: 10.20.255.11
  role: rr_client
  neighbors:
    - peer_ip: 10.20.255.1
      remote_as: 65020
      description: "iBGP RR -> spine-sin-01"
      update_source: Loopback0
      md5_password_ref: bgp_md5_sin_dc1_fabric
    - peer_ip: 10.20.255.2
      remote_as: 65020
      description: "iBGP RR -> spine-sin-02"
      update_source: Loopback0
      md5_password_ref: bgp_md5_sin_dc1_fabric
