---
hostname: fw-sin-01
fqdn: fw-sin-01.sin-dc1.acme-investments.internal
role: firewall
platform: frr
image: frrouting/frr:9.1.0
hardware_model: "Virtual Appliance (Linux KVM)"
serial: FWSIN2420030
eol_date: "2028-12-31"
lab_state: sot_only
site: sin-dc1
region: apac
compliance_tags: [mas_trm, hkma_cfi, apac_data_residency]
security_zones: [TRADING, CORPORATE, DMZ, MGMT_ZONE]
management:
  interface: eth0
  ip: 10.20.0.30/25
  gateway: 10.20.0.126
loopback:
  interface: lo
  ip: 10.20.255.30/32
interfaces:
  - name: eth0
    description: "OOB management"
    ip: 10.20.0.30/25
  - name: eth1
    description: "-> border-sin-01 eth5 [DMZ external]"
    ip: 10.20.6.254/24
    zone: DMZ
    mtu: 9000
  - name: eth2
    description: "-> leaf-sin-03 Ethernet4 [internal TRADING/CORPORATE]"
    ip: 10.20.1.254/24
    peer_device: leaf-sin-03
    peer_interface: Ethernet4
    zone: TRADING
    mtu: 9000
  - name: eth3
    description: "-> leaf-sin-04 Ethernet4 [MGMT]"
    ip: 10.20.0.254/25
    peer_device: leaf-sin-04
    peer_interface: Ethernet4
    zone: MGMT_ZONE
    mtu: 9000
  - name: lo
    ip: 10.20.255.30/32
firewall_policy:
  default_action: deny
  stateful: true
  policy_set: acme_dc_firewall_policy_v3
bgp:
  local_as: 65020
  router_id: 10.20.255.30
  role: firewall_bgp
  neighbors:
    - peer_ip: 10.20.6.253
      remote_as: 65020
      description: "iBGP to border-sin-01 for DMZ routing"
      md5_password_ref: bgp_md5_sin_dc1_fabric
