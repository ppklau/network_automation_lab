# ACME Investments — APAC Branch Devices
# 6 branches connecting to sin-dc1 via border-sin-01 (eBGP)
# All sot_only — no APAC branch stubs in containerlab
# Branches carry CORPORATE and MGMT zones only
# Last reviewed: 2026-03-01

region: apac
uplink_dc: sin-dc1
uplink_border: border-sin-01
platform: frr
image: frrouting/frr:9.1.0
hardware_model: FRR Virtual Router (branch CPE)
eol_date: "2028-06-30"
compliance_tags: [mas_trm]
