---
# ACME Investments — EU Branch Devices
# 4 branches connecting to fra-dc1 via border-fra-01 (eBGP)
# All sot_only — no EU branch stubs in containerlab
# CRITICAL: EU branches inherit Frankfurt TRADING zone prohibition
# Branches carry CORPORATE and MGMT zones ONLY — no TRADING, no DMZ
# Last reviewed: 2026-03-01

region: eu-fra
uplink_dc: fra-dc1
uplink_border: border-fra-01
platform: frr
image: frrouting/frr:9.1.0
hardware_model: FRR Virtual Router (branch CPE)
eol_date: "2028-06-30"
compliance_tags: [bafin, eu_gdpr, no_trading_zone]
# TRADING zone is PROHIBITED — EU branches inherit Frankfurt restriction
security_zones: [CORPORATE, MGMT_ZONE]
intent_refs: [INTENT-005, INTENT-006, INTENT-007, INTENT-010, INTENT-011]
trading_zone_prohibited: true

branches:

  - hostname: branch-fra-01
    fqdn: branch-fra-01.eu.acme-investments.internal
    lab_state: sot_only
    device_serial: BRNFRA2401001
    site_code: branch-fra-01
    asn: 65140
    office_type: corporate
    location:
      city: Frankfurt
      address: Bockenheimer Landstrasse 24, 60323 Frankfurt am Main
      country: Germany
