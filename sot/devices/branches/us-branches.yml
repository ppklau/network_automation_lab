---
# ACME Investments — US Branch Devices
# 8 branches connecting to nyc-dc1 via border-nyc-01 (eBGP)
# Branches only carry CORPORATE and MGMT zones — no TRADING, no DMZ
# branch-nyc-01 is lab_state: active; all others sot_only
# Last reviewed: 2026-03-01

region: americas-nyc
uplink_dc: nyc-dc1
uplink_border: border-nyc-01
platform: frr
image: frrouting/frr:9.1.0
hardware_model: "FRR Virtual Router (branch CPE)"
eol_date: "2028-06-30"
compliance_tags: [sox, sec]
security_zones: [CORPORATE, MGMT_ZONE]
intent_refs: [INTENT-005, INTENT-006, INTENT-007, INTENT-010, INTENT-011]

branches:

  - hostname: branch-nyc-01
    fqdn: branch-nyc-01.americas.acme-investments.internal
    lab_state: active     # Instantiated in containerlab
    device_serial: BRNNYC2401001
    site_code: branch-nyc-01
    asn: 65120
    office_type: trading
    location:
      city: New York
      address: "200 Liberty Street, New York, NY 10281"
      country: US
    management_ip: 10.101.0.1/29
    wan_prefix: 10.101.0.0/29
    wan_ip: 10.101.0.1
    uplink_peer_ip: 10.101.0.2
    lan_prefix: 10.101.0.0/29
    interfaces:
      eth0:
        description: "OOB management"
        ip: 10.101.0.1/29
      eth1:
        description: "WAN uplink -> border-nyc-01 [eBGP AS65120<->AS65010]"
        ip: 10.101.0.1/29
        peer_device: border-nyc-01
        peer_ip: 10.101.0.2
      eth2:
        description: "LAN — branch office network"
        ip: 10.101.0.1/29
    bgp:
      local_as: 65120
      router_id: 10.101.0.1
      neighbors:
        - peer_ip: 10.101.0.2
