---
# ACME Investments — UK Branch Devices
# 12 branches connecting to lon-dc1 via border-lon-01 (eBGP)
# Branches only carry CORPORATE and MGMT zones — no TRADING, no DMZ
# Platform: FRRouting (frr) on Linux
# branch-lon-01 is lab_state: active; all others sot_only
# Last reviewed: 2026-03-01

region: emea-lon
uplink_dc: lon-dc1
uplink_border: border-lon-01
platform: frr
image: frrouting/frr:9.1.0
hardware_model: "FRR Virtual Router (branch CPE)"
eol_date: "2028-06-30"
compliance_tags: [fca, uk_gdpr]
security_zones: [CORPORATE, MGMT_ZONE]   # branches never carry TRADING or DMZ
intent_refs: [INTENT-005, INTENT-006, INTENT-007, INTENT-010, INTENT-011]

branches:

  - hostname: branch-lon-01
    fqdn: branch-lon-01.emea.acme-investments.internal
    lab_state: active     # Instantiated in containerlab as branch stub
    device_serial: BRNLON2401001
    site_code: branch-lon-01
    asn: 65100
    office_type: trading
    location:
      city: London
      address: "1 Canada Square, Canary Wharf, London E14 5AB"
      country: UK
    management_ip: 10.100.0.1/29
    wan_prefix: 10.100.0.0/29
    wan_ip: 10.100.0.1          # branch WAN IP (eBGP source)
    uplink_peer_ip: 10.100.0.2  # border-lon-01 peer IP
    lan_prefix: 10.100.0.0/29
    interfaces:
      eth0:
        description: "OOB management"
        ip: 10.100.0.1/29
      eth1:
        description: "WAN uplink -> border-lon-01 [eBGP AS65100<->AS65001]"
        ip: 10.100.0.1/29
        peer_device: border-lon-01
        peer_ip: 10.100.0.2
      eth2:
        description: "LAN — branch office network"
        ip: 10.100.0.1/29
    bgp:
      local_as: 65100
      router_id: 10.100.0.1
      neighbors:
        - peer_ip: 10.100.0.2
          remote_as: 65001
          description: "eBGP -> border-lon-01"
          md5_password_ref: bgp_md5_branch_lon_01
          route_map_in: RM_INTERDC_LON_NYC_IN
          route_map_out: RM_BRANCH_OUT
      networks_advertised:
        - prefix: 10.100.0.0/29
          description: "Branch LAN"

