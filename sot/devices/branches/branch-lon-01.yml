---
# ACME Investments — Device: branch-lon-01
# Role: Branch CPE (FRR stub) — UK, Canary Wharf
# lab_state: ACTIVE — FRR node instantiated in containerlab as branch stub
# eBGP peer to border-lon-01 on 10.100.0.0/29
# Last reviewed: 2026-03-01

hostname: branch-lon-01
fqdn: branch-lon-01.emea.acme-investments.internal
role: branch
platform: frr
image: quay.io/frrouting/frr:9.1.3
hardware_model: "FRR Virtual Router (branch CPE)"
serial: BRNLON2401001
eol_date: "2028-06-30"

site: branch-lon-01
region: emea-lon
lab_state: active

uplink_dc: lon-dc1
uplink_border: border-lon-01

compliance_tags: [fca, uk_gdpr]
security_zones: [CORPORATE, MGMT_ZONE]
intent_refs: [INTENT-005, INTENT-006, INTENT-007, INTENT-010, INTENT-011]

management:
  interface: eth0
  ip: 10.100.0.1/29

interfaces:
  - name: eth0
    description: "OOB management"
    ip: 10.100.0.1/29
    mtu: 1500

  - name: eth1
    description: "WAN uplink -> border-lon-01 [eBGP AS65100<->AS65001]"
    ip: 10.100.0.1/29
    peer_device: border-lon-01
    peer_ip: 10.100.0.2
    mtu: 9000

  - name: eth2
    description: "LAN — branch office network"
    ip: 10.100.0.1/29
    mtu: 1500

bgp:
  local_as: 65100
  router_id: 10.100.0.1
  neighbors:
    - peer_ip: 10.100.0.2
      remote_as: 65001
      description: "eBGP -> border-lon-01"
      md5_password_ref: bgp_md5_branch_lon_01
      route_map_in: RM_INTERDC_LON_NYC_IN
      route_map_out: RM_BRANCH_OUT
  networks_advertised:
    - prefix: 10.100.0.0/29
      description: "Branch LAN"
  log_neighbor_changes: true
