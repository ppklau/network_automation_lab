! ─────────────────────────────────────────────────────────────────────────────
! FRR configuration — fw-lon-01
! ACME Investments Network Automation Lab
!
! Role: Firewall — London DC1
! Inter-zone enforcement: TRADING / CORPORATE / DMZ / MGMT_ZONE
! Compliance: MiFID II, FCA, UK GDPR — trading isolation enforced
!
! Interfaces (containerlab eth numbering):
!   eth0 = OOB management (containerlab bridge, 172.20.20.32/24)
!   eth1 = border-lon-01 Ethernet6 — DMZ external boundary
!   eth2 = leaf-lon-03 Ethernet5  — TRADING+CORPORATE internal
!   eth3 = leaf-lon-04 Ethernet5  — DMZ+MGMT internal
!
! BGP: AS65001, iBGP to border-lon-01 for DMZ route exchange
! ─────────────────────────────────────────────────────────────────────────────
frr version 9.1
frr defaults traditional
hostname fw-lon-01
log syslog informational
no ipv6 forwarding
!
! ── Interfaces ──────────────────────────────────────────────────────────────
!
interface lo
 description Loopback — router-id and BGP update-source
 ip address 10.1.255.30/32
!
interface eth1
 description DMZ external boundary -> border-lon-01 Ethernet6
 ip address 10.1.6.254/24
 ip access-group DMZ_IN in
!
interface eth2
 description TRADING+CORPORATE internal -> leaf-lon-03 Ethernet5
 ip address 10.1.1.254/24
!
interface eth3
 description DMZ+MGMT internal -> leaf-lon-04 Ethernet5
 ip address 10.1.0.254/25
!
! ── BGP ─────────────────────────────────────────────────────────────────────
! fw-lon-01 runs iBGP to exchange DMZ reachability with border-lon-01.
! It is not a full iBGP participant in the LON DC1 fabric.
! Session peers via DMZ subnet (10.1.6.x); update-source is the loopback.
!
router bgp 65001
 bgp router-id 10.1.255.30
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 10.1.6.253 remote-as 65001
 neighbor 10.1.6.253 description iBGP to border-lon-01 [DMZ route exchange]
 neighbor 10.1.6.253 update-source lo
 neighbor 10.1.6.253 password CHANGEME
 !
 address-family ipv4 unicast
  neighbor 10.1.6.253 activate
  network 10.1.6.0/24
 exit-address-family
!
! ── Static routes ────────────────────────────────────────────────────────────
! Default route toward border-lon-01 DMZ-facing address for management traffic.
!
ip route 0.0.0.0/0 10.1.6.253
!
line vty
!
