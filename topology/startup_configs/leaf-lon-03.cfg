! ─────────────────────────────────────────────────────────────────────────────
! Bootstrap configuration — leaf-lon-03
! ACME Investments Network Automation Lab
!
! This is a BOOTSTRAP config only. Management0 IP is set by containerlab.
! Full device configuration is pushed by Ansible from the SoT:
!   ansible-playbook playbooks/push_configs.yml --limit leaf-lon-03
! ─────────────────────────────────────────────────────────────────────────────
!
hostname leaf-lon-03
!
no aaa root
!
username admin privilege 15 role network-admin secret admin
username ansible privilege 15 role network-admin secret CHANGEME
!
management api http-commands
   protocol http
   no shutdown
!
management ssh
   no shutdown
!
aaa authentication login default local
aaa authorization exec default local
!
logging on
!
end
