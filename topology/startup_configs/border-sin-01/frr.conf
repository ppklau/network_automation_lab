! ─────────────────────────────────────────────────────────────────────────────
! FRR configuration — border-sin-01
! ACME Investments Network Automation Lab
!
! Role: Border stub — SIN DC1 (FRR, lightweight WAN peer)
! Simulates the remote end of the LON<->SIN WAN circuit.
! In production: full Arista EOS device with a complete SIN DC1 fabric.
! Lab purpose: provide a reachable eBGP peer for border-lon-01.
!
! Interfaces:
!   eth0 = OOB management (containerlab bridge, 172.20.20.42/24)
!   eth1 = WAN -> border-lon-01 Ethernet4  10.0.2.0/31 (sin=.1, lon=.0)
!
! BGP: AS65020
!   eBGP to border-lon-01 (AS65001) via 10.0.2.0
!   Advertises: 10.20.0.0/16 (SIN DC1 aggregate)
!   Compliance: MAS TRM, APAC data residency
! ─────────────────────────────────────────────────────────────────────────────
frr version 9.1
frr defaults traditional
hostname border-sin-01
log syslog informational
no ipv6 forwarding
!
! ── Interfaces ──────────────────────────────────────────────────────────────
!
interface lo
 description Loopback — router-id
 ip address 10.20.255.20/32
!
interface eth1
 description WAN -> border-lon-01 Ethernet4 [eBGP AS65020<->AS65001]
 ip address 10.0.2.1/31
!
! ── BGP ─────────────────────────────────────────────────────────────────────
!
router bgp 65020
 bgp router-id 10.20.255.20
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 10.0.2.0 remote-as 65001
 neighbor 10.0.2.0 description eBGP WAN -> border-lon-01 [EMEA HQ]
 neighbor 10.0.2.0 password CHANGEME
 neighbor 10.0.2.0 timers 30 90
 !
 address-family ipv4 unicast
  neighbor 10.0.2.0 activate
  neighbor 10.0.2.0 route-map RM_INTERDC_LON_SIN_IN in
  neighbor 10.0.2.0 route-map RM_INTERDC_LON_SIN_OUT out
  !
  network 10.20.0.0/16
  aggregate-address 10.20.0.0/16 summary-only
 exit-address-family
!
! ── Null route for stub aggregate ───────────────────────────────────────────
!
ip route 10.20.0.0/16 Null0
!
! ── Route maps (permissive — full policy applied in production) ─────────────
!
route-map RM_INTERDC_LON_SIN_IN permit 10
!
route-map RM_INTERDC_LON_SIN_OUT permit 10
!
line vty
!
