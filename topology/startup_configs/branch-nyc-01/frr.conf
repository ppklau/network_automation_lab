! ─────────────────────────────────────────────────────────────────────────────
! FRR configuration — branch-nyc-01
! ACME Investments Network Automation Lab
!
! Role: Branch CPE stub — New York branch office (200 Liberty Street, US)
! Simulates a US branch CPE connecting back to border-nyc-01 via eBGP.
!
! Interfaces:
!   eth0 = OOB management (containerlab bridge, 172.20.20.52/24)
!   eth1 = WAN uplink -> border-nyc-01 eth4  10.101.0.0/29
!            branch-nyc-01=.1, border-nyc-01 peer=.2
!
! BGP: AS65120 (US branch ASN pool: 65120-65127)
!   eBGP to border-nyc-01 (AS65010) via 10.101.0.2
!   Advertises: 10.101.0.0/29 (branch LAN/WAN prefix)
!   Compliance: SOX, SEC Reg SCI — CORPORATE and MGMT zones only
! ─────────────────────────────────────────────────────────────────────────────
frr version 9.1
frr defaults traditional
hostname branch-nyc-01
log syslog informational
no ipv6 forwarding
!
! ── Interfaces ──────────────────────────────────────────────────────────────
!
interface lo
 description Loopback — router-id
 ip address 10.101.0.1/32
!
interface eth1
 description WAN uplink -> border-nyc-01 eth4 [eBGP AS65120<->AS65010]
 ip address 10.101.0.1/29
!
! ── BGP ─────────────────────────────────────────────────────────────────────
!
router bgp 65120
 bgp router-id 10.101.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 10.101.0.2 remote-as 65010
 neighbor 10.101.0.2 description eBGP -> border-nyc-01
 neighbor 10.101.0.2 password CHANGEME
 !
 address-family ipv4 unicast
  neighbor 10.101.0.2 activate
  neighbor 10.101.0.2 route-map RM_BRANCH_OUT out
  !
  ! Advertise the branch /29 (WAN+LAN prefix per INTENT-007)
  network 10.101.0.0/29
 exit-address-family
!
! ── Route maps ───────────────────────────────────────────────────────────────
!
! Outbound: only advertise branch prefix — no corporate or DC routes
ip prefix-list PL_BRANCH_OUT seq 5 permit 10.101.0.0/29
ip prefix-list PL_BRANCH_OUT seq 100 deny any
!
route-map RM_BRANCH_OUT permit 10
 match ip address prefix-list PL_BRANCH_OUT
!
line vty
!
