! ─────────────────────────────────────────────────────────────────────────────
! FRR configuration — border-fra-01
! ACME Investments Network Automation Lab
!
! Role: Border stub — FRA DC1 (FRR, lightweight WAN peer)
! Simulates the remote end of the LON<->FRA WAN circuit.
! In production: full Arista EOS device with a complete FRA DC1 fabric.
! Lab purpose: provide a reachable eBGP peer for border-lon-01.
!
! COMPLIANCE CRITICAL — FRANKFURT RING-FENCING:
!   MiFID II / BaFin: TRADING zone prefixes (10.1.1.0/24, community 65001:100)
!   must NEVER be accepted or advertised on this node.
!   PL_DENY_TRADING blocks 10.1.1.0/24 le 32 inbound.
!   FRA only advertises CORPORATE and MGMT prefixes (10.30.0.0/16).
!   VLAN 100 (TRADING_VRF) must not appear in any config on this node.
!
! Interfaces:
!   eth0 = OOB management (containerlab bridge, 172.20.20.43/24)
!   eth1 = WAN -> border-lon-01 Ethernet5  10.0.3.0/31 (fra=.1, lon=.0)
!
! BGP: AS65030
!   eBGP to border-lon-01 (AS65001) via 10.0.3.0
!   Advertises: 10.30.0.0/16 (FRA DC1 — CORPORATE + MGMT only)
! ─────────────────────────────────────────────────────────────────────────────
frr version 9.1
frr defaults traditional
hostname border-fra-01
log syslog informational
no ipv6 forwarding
!
! ── Interfaces ──────────────────────────────────────────────────────────────
!
interface lo
 description Loopback — router-id
 ip address 10.30.255.20/32
!
interface eth1
 description WAN -> border-lon-01 Ethernet5 [eBGP AS65030<->AS65001]
 ip address 10.0.3.1/31
!
! ── Prefix lists — Frankfurt TRADING filter (INTENT-003, INTENT-004) ────────
!
! Deny TRADING zone prefix (10.1.1.0/24) and any more-specific.
! Applied inbound on the LON WAN session — NEVER accept TRADING routes.
ip prefix-list PL_DENY_TRADING seq 5 deny 10.1.1.0/24 le 32
ip prefix-list PL_DENY_TRADING seq 10 permit any
!
! Outbound: FRA only advertises its own aggregate (corporate/mgmt).
! The network statement handles this implicitly; no TRADING routes exist here.
ip prefix-list PL_FRA_EXPORT seq 5 permit 10.30.0.0/16
ip prefix-list PL_FRA_EXPORT seq 100 deny any
!
! ── Route maps ───────────────────────────────────────────────────────────────
!
! Inbound from LON: deny TRADING prefixes, permit everything else.
route-map RM_INTERDC_LON_FRA_IN permit 10
 description "Deny TRADING prefixes from LON — BaFin/MiFID II compliance"
 match ip address prefix-list PL_DENY_TRADING
!
! Outbound to LON: only advertise FRA DC1 aggregate.
route-map RM_INTERDC_LON_FRA_OUT permit 10
 description "Export FRA DC1 aggregate only — no TRADING leakage"
 match ip address prefix-list PL_FRA_EXPORT
!
! ── BGP ─────────────────────────────────────────────────────────────────────
!
router bgp 65030
 bgp router-id 10.30.255.20
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 10.0.3.0 remote-as 65001
 neighbor 10.0.3.0 description eBGP WAN -> border-lon-01 [EMEA HQ] TRADING-FILTERED
 neighbor 10.0.3.0 password CHANGEME
 neighbor 10.0.3.0 timers 30 90
 !
 address-family ipv4 unicast
  neighbor 10.0.3.0 activate
  neighbor 10.0.3.0 route-map RM_INTERDC_LON_FRA_IN in
  neighbor 10.0.3.0 route-map RM_INTERDC_LON_FRA_OUT out
  !
  ! FRA DC1 aggregate — CORPORATE and MGMT zones only; TRADING_VRF absent
  network 10.30.0.0/16
  aggregate-address 10.30.0.0/16 summary-only
 exit-address-family
!
! ── Null route for stub aggregate ───────────────────────────────────────────
!
ip route 10.30.0.0/16 Null0
!
line vty
!
