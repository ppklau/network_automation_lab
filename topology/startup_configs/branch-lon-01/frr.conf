! ─────────────────────────────────────────────────────────────────────────────
! FRR configuration — branch-lon-01
! ACME Investments Network Automation Lab
!
! Role: Branch CPE stub — London branch office (Canary Wharf, UK)
! Simulates a UK branch CPE connecting back to border-lon-01 via eBGP.
!
! Interfaces:
!   eth0 = OOB management (containerlab bridge, 172.20.20.51/24)
!   eth1 = WAN uplink -> border-lon-01 Ethernet7  10.100.0.0/29
!            branch-lon-01=.1, border-lon-01 peer=.2
!
! BGP: AS65100 (UK branch ASN pool: 65100-65111)
!   eBGP to border-lon-01 (AS65001) via 10.100.0.2
!   Advertises: 10.100.0.0/29 (branch LAN/WAN prefix)
!   Compliance: FCA, UK GDPR — CORPORATE and MGMT zones only
! ─────────────────────────────────────────────────────────────────────────────
frr version 9.1
frr defaults traditional
hostname branch-lon-01
log syslog informational
no ipv6 forwarding
!
! ── Interfaces ──────────────────────────────────────────────────────────────
!
interface lo
 description Loopback — router-id
 ip address 10.100.0.1/32
!
interface eth1
 description WAN uplink -> border-lon-01 [eBGP AS65100<->AS65001]
 ip address 10.100.0.1/29
!
! ── BGP ─────────────────────────────────────────────────────────────────────
!
router bgp 65100
 bgp router-id 10.100.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 neighbor 10.100.0.2 remote-as 65001
 neighbor 10.100.0.2 description eBGP -> border-lon-01
 neighbor 10.100.0.2 password CHANGEME
 !
 address-family ipv4 unicast
  neighbor 10.100.0.2 activate
  neighbor 10.100.0.2 route-map RM_BRANCH_OUT out
  !
  ! Advertise the branch /29 (WAN+LAN prefix per INTENT-007)
  network 10.100.0.0/29
 exit-address-family
!
! ── Route maps ───────────────────────────────────────────────────────────────
!
! Outbound: only advertise branch prefix — no corporate or DC routes
ip prefix-list PL_BRANCH_OUT seq 5 permit 10.100.0.0/29
ip prefix-list PL_BRANCH_OUT seq 100 deny any
!
route-map RM_BRANCH_OUT permit 10
 match ip address prefix-list PL_BRANCH_OUT
!
line vty
!
