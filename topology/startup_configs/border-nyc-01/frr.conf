! ─────────────────────────────────────────────────────────────────────────────
! FRR configuration — border-nyc-01
! ACME Investments Network Automation Lab
!
! Role: Border stub — NYC DC1 (FRR, lightweight WAN peer)
! Simulates the remote end of the LON<->NYC WAN circuit.
! In production: full Arista EOS device with a complete NYC DC1 fabric.
! Lab purpose: provide a reachable eBGP peer for border-lon-01.
!
! Interfaces:
!   eth0 = OOB management (containerlab bridge, 172.20.20.41/24)
!   eth1 = WAN -> border-lon-01 Ethernet3  10.0.1.0/31 (nyc=.1, lon=.0)
!   eth2 = (unused data; fabric peers are sot_only, not connected in lab)
!   eth4 = Branch uplink -> branch-nyc-01 eth1  10.101.0.0/29 (border=.2)
!
! BGP: AS65010
!   eBGP to border-lon-01 (AS65001) via 10.0.1.0
!   eBGP to branch-nyc-01 (AS65120) via 10.101.0.1
!   Advertises: 10.10.0.0/16 (NYC DC1 aggregate), 10.101.0.0/16 (US branches)
! ─────────────────────────────────────────────────────────────────────────────
frr version 9.1
frr defaults traditional
hostname border-nyc-01
log syslog informational
no ipv6 forwarding
!
! ── Interfaces ──────────────────────────────────────────────────────────────
!
interface lo
 description Loopback — router-id
 ip address 10.10.255.20/32
!
interface eth1
 description WAN -> border-lon-01 Ethernet3 [eBGP AS65010<->AS65001]
 ip address 10.0.1.1/31
!
interface eth4
 description Branch uplink -> branch-nyc-01 eth1 [eBGP AS65010<->AS65120]
 ip address 10.101.0.2/29
!
! ── BGP ─────────────────────────────────────────────────────────────────────
!
router bgp 65010
 bgp router-id 10.10.255.20
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! ── eBGP WAN to London ──
 neighbor 10.0.1.0 remote-as 65001
 neighbor 10.0.1.0 description eBGP WAN -> border-lon-01 [EMEA HQ]
 neighbor 10.0.1.0 password CHANGEME
 neighbor 10.0.1.0 timers 30 90
 !
 ! ── eBGP US Branch (active lab node only) ──
 neighbor 10.101.0.1 remote-as 65120
 neighbor 10.101.0.1 description eBGP branch -> branch-nyc-01
 neighbor 10.101.0.1 password CHANGEME
 !
 address-family ipv4 unicast
  neighbor 10.0.1.0 activate
  neighbor 10.0.1.0 route-map RM_INTERDC_LON_NYC_IN in
  neighbor 10.0.1.0 route-map RM_INTERDC_LON_NYC_OUT out
  neighbor 10.101.0.1 activate
  neighbor 10.101.0.1 route-map RM_BRANCH_IN in
  neighbor 10.101.0.1 route-map RM_BRANCH_OUT out
  !
  ! Stub aggregates — represent NYC DC1 and US branch space
  network 10.10.0.0/16
  network 10.101.0.0/16
  aggregate-address 10.10.0.0/16 summary-only
  aggregate-address 10.101.0.0/16 summary-only
 exit-address-family
!
! ── Null routes for stub aggregates ─────────────────────────────────────────
! Aggregates require a more-specific to exist; use null routes as anchors.
!
ip route 10.10.0.0/16 Null0
ip route 10.101.0.0/16 Null0
!
! ── Route maps (permissive — full policy pushed by Ansible in production) ───
!
route-map RM_INTERDC_LON_NYC_IN permit 10
!
route-map RM_INTERDC_LON_NYC_OUT permit 10
!
route-map RM_BRANCH_IN permit 10
!
route-map RM_BRANCH_OUT permit 10
!
line vty
!
