! ─────────────────────────────────────────────────────────────────────────────
! Bootstrap configuration — spine-lon-01
! ACME Investments Network Automation Lab
!
! This is a BOOTSTRAP config only. It provides SSH + eAPI access for Ansible.
! Management0 IP is assigned automatically by containerlab (172.20.20.11/24).
! Full device configuration is pushed by Ansible from the SoT:
!   ansible-playbook playbooks/push_configs.yml --limit spine-lon-01
!
! Credentials: admin / admin  (change before any external exposure)
! ─────────────────────────────────────────────────────────────────────────────
!
hostname spine-lon-01
!
! ── Local user — admin access for Ansible and SSH ─────────────────────────────
no aaa root
!
username admin privilege 15 role network-admin secret admin
!
! ── Management API — required for Ansible (eos httpapi or network_cli) ──────────
management api http-commands
   no protocol https
   no shutdown
!
! ── SSH — required for Ansible (network_cli) and manual console access ──────────
management ssh
   no shutdown
!
! ── Local authentication — no RADIUS/TACACS in lab ──────────────────────────────
aaa authentication login default local
aaa authorization exec default local
!
! ── Logging — minimal for bootstrap; Ansible pushes full syslog config ──────────
logging on
!
end
