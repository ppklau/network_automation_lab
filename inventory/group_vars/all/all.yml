---
# ACME Investments — Ansible Group Vars (all hosts)
# Applied to every host in the inventory.
# Credentials and secrets: see vault.yml (ansible-vault encrypted in production).
# Global SoT data (NTP, SNMP, platform defaults) is loaded by render_configs.yml.

# ── Ansible connection settings ───────────────────────────────────────────

# Default for cEOS devices — overridden per host via platform field in SoT
ansible_network_os: arista.eos.eos
ansible_connection: ansible.netcommon.httpapi
ansible_httpapi_use_ssl: true
ansible_httpapi_port: 443
ansible_httpapi_validate_certs: false
ansible_httpapi_vrf: MGMT
ansible_user: ansible
ansible_password: "{{ vault_ansible_password }}"

# ── Paths — used by render_configs.yml ───────────────────────────────────

sot_device_dir: "{{ inventory_dir }}/../sot/devices"
sot_global_dir: "{{ inventory_dir }}/../sot/global"
configs_output_dir: "{{ inventory_dir }}/../configs"
