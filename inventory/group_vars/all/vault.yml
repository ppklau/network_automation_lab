---
# ACME Investments — Ansible Vault: Secret References
# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION: This file must be encrypted with ansible-vault before committing.
#   ansible-vault encrypt inventory/group_vars/vault.yml
#
# LAB: Plain-text CHANGEME values used for lab bootstrap.
#   Do NOT expose this file externally. Rotate all secrets before production use.
#
# In production, secrets are fetched from HashiCorp Vault via:
#   ansible-playbook --vault-password-file ~/.vault_pass.txt ...
# ─────────────────────────────────────────────────────────────────────────────

# Ansible service account password (used for all device connections)
vault_ansible_password: CHANGEME

# Break-glass local admin passwords (keyed by password_ref in platform_defaults)
vault_local_passwords:
  local_admin_password: CHANGEME
  ansible_password: CHANGEME

# NTP MD5 authentication keys
vault_ntp_keys:
  ntp_key_primary: CHANGEME
  ntp_key_secondary: CHANGEME

# SNMP v3 auth and priv keys
vault_snmp_keys:
  snmp_auth_key_monitoring: CHANGEME
  snmp_priv_key_monitoring: CHANGEME
  snmp_auth_key_ops: CHANGEME
  snmp_priv_key_ops: CHANGEME
  snmp_auth_key_audit: CHANGEME
  snmp_priv_key_audit: CHANGEME

