---
# scenarios/common/verify_lab_healthy.yml
#
# Quick pre-exercise sanity check. Verifies the lab is in a healthy state
# before starting any exercise that depends on a known-good baseline.
#
# Checks:
#   - All BGP sessions Established (EOS and FRR) — expected peers only (from SoT)
#   - Management plane reachable for all active nodes
#   - No active scenario breadcrumbs from a previous exercise
#
# Exit code: 0 = healthy, 1 = one or more checks failed
#
# Usage:
#   ansible-playbook scenarios/common/verify_lab_healthy.yml

- name: Check BGP health on active nodes
  hosts: lab_active
  gather_facts: false
  pre_tasks:
    # Load device SoT so bgp.neighbors is available for the BGP peer checks below.
    # find runs on the control node (delegate_to: localhost); include_vars is an
    # action plugin that always loads into the current host's variable context.
    - name: Find device SoT file
      ansible.builtin.find:
        paths: "{{ sot_device_dir }}"
        patterns: "{{ inventory_hostname }}.yml"
        recurse: true
      register: device_sot_search
      delegate_to: localhost

    - name: Load device SoT data
      ansible.builtin.include_vars:
        file: "{{ device_sot_search.files[0].path }}"
      when: device_sot_search.files | length > 0

  tasks:
    - name: Check for stale scenario breadcrumb
      ansible.builtin.stat:
        path: /tmp/scenario_active.txt
      register: breadcrumb_stat
      become: true
      failed_when: false

    - name: Warn if stale breadcrumb exists
      when: breadcrumb_stat.stat.exists | default(false)
      ansible.builtin.debug:
        msg: >
          WARNING: /tmp/scenario_active.txt exists on {{ inventory_hostname }}.
          A scenario may not have been cleaned up. Run reset_lab.yml first.

    # ── EOS BGP check ────────────────────────────────────────────────────
    # Only asserts on peers listed in bgp.neighbors (from the SoT).
    # Inactive branch/site stubs in the BGP config are intentionally excluded.

    - name: Collect BGP summary (EOS)
      when: ansible_network_os is search('eos')
      arista.eos.eos_command:
        commands:
          - show bgp summary | json
      register: eos_bgp
      failed_when: false

    - name: Assert expected EOS BGP peers Established
      when: ansible_network_os is search('eos') and eos_bgp is not failed
      ansible.builtin.assert:
        that:
          - eos_bgp.stdout[0].vrfs.default.peers[item.peer_ip] is defined
          - eos_bgp.stdout[0].vrfs.default.peers[item.peer_ip].peerState == 'Established'
        fail_msg: >
          [{{ inventory_hostname }}] BGP peer {{ item.peer_ip }}
          ({{ item.description | default('') }}) is
          {{ eos_bgp.stdout[0].vrfs.default.peers[item.peer_ip].peerState | default('missing') }}.
          Run: ansible-playbook scenarios/common/reset_lab.yml
        success_msg: "[{{ inventory_hostname }}] BGP peer {{ item.peer_ip }} is Established."
      loop: "{{ bgp.neighbors | default([]) }}"
      register: eos_bgp_assertions
      failed_when: false

    # ── FRR BGP check ─────────────────────────────────────────────────────
    # network_cli for FRR drops into vtysh, not a Linux shell, so collect BGP
    # state via docker exec delegated to localhost (same pattern as verify_state.yml).

    - name: Collect BGP summary (FRR)
      when: ansible_network_os == 'frr'
      ansible.builtin.shell: >
        docker exec clab-acme-lab-{{ inventory_hostname }}
        vtysh -c 'show bgp summary json'
      delegate_to: localhost
      register: frr_bgp
      changed_when: false
      failed_when: false

    - name: Assert expected FRR BGP peers Established
      when: ansible_network_os == 'frr' and frr_bgp is not failed and frr_bgp.stdout | default('') | length > 0
      vars:
        frr_peers: "{{ (frr_bgp.stdout | from_json).get('ipv4Unicast', {}).get('peers', {}) }}"
      ansible.builtin.assert:
        that:
          - frr_peers[item.peer_ip] is defined
          - frr_peers[item.peer_ip].state == 'Established'
        fail_msg: >
          [{{ inventory_hostname }}] BGP peer {{ item.peer_ip }}
          ({{ item.description | default('') }}) is
          {{ frr_peers[item.peer_ip].state | default('missing') }}.
          Run: ansible-playbook scenarios/common/reset_lab.yml
        success_msg: "[{{ inventory_hostname }}] BGP peer {{ item.peer_ip }} is Established."
      loop: "{{ bgp.neighbors | default([]) }}"
      register: frr_bgp_assertions
      failed_when: false

    - name: Record BGP failures on localhost
      ansible.builtin.set_fact:
        bgp_check_failed_hosts: "{{ (hostvars['localhost'].bgp_check_failed_hosts | default([])) + [inventory_hostname] }}"
      delegate_to: localhost
      when: >
        (eos_bgp_assertions.results | default([]) | selectattr('failed', 'equalto', true) | list | length > 0)
        or
        (frr_bgp_assertions.results | default([]) | selectattr('failed', 'equalto', true) | list | length > 0)

- name: Check management reachability
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ping management IPs
      ansible.builtin.command: "ping -c 1 -W 2 {{ hostvars[item].ansible_host }}"
      loop: "{{ groups['lab_active'] }}"
      register: mgmt_ping
      failed_when: false
      changed_when: false

    - name: Report unreachable management IPs
      vars:
        unreachable: "{{ mgmt_ping.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"
      ansible.builtin.assert:
        that: unreachable | length == 0
        fail_msg: >
          Management IPs unreachable for: {{ unreachable | join(', ') }}.
          Check that containerlab is running: sudo containerlab deploy --topo topology/containerlab.yml
        success_msg: "All management IPs reachable."

- name: Health check summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Lab healthy
      ansible.builtin.assert:
        that: bgp_check_failed_hosts | default([]) | length == 0
        fail_msg: >
          Lab health check FAILED. BGP sessions not Established on:
          {{ bgp_check_failed_hosts | default([]) | join(', ') }}.
          Run: ansible-playbook scenarios/common/reset_lab.yml
        success_msg: >
          Lab health check PASSED.
          All BGP sessions Established. Management plane reachable.
          Safe to proceed with exercises.
