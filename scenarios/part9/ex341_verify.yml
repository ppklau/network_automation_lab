---
# scenarios/ch11/ex113_verify.yml
#
# ACME Investments — Exercise 11.3 Verification
# Verifies that the staged rollout correctly:
#   1. Detected the canary failure on leaf-lon-01
#   2. Rolled back leaf-lon-01 (RM_LEAF_IN restored)
#   3. Did NOT push changes to leaf-lon-02 or leaf-lon-03
#
# Usage:
#   ansible-playbook scenarios/ch11/ex113_verify.yml

- name: Check scenario breadcrumb exists
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Stat breadcrumb file
      stat:
        path: /tmp/scenario_active.txt
      register: breadcrumb_stat

    - name: Fail if breadcrumb missing
      fail:
        msg: >-
          /tmp/scenario_active.txt not found.
          Run scenarios/ch11/ex113_inject.yml before verifying.
      when: not breadcrumb_stat.stat.exists

    - name: Show scenario active
      debug:
        msg: "Scenario breadcrumb found. Running verification checks."

- name: Verify canary (leaf-lon-01) was rolled back
  hosts: leaf-lon-01
  gather_facts: false
  tasks:
    - name: Collect BGP running config
      arista.eos.eos_command:
        commands:
          - show running-config section router bgp
      register: leaf01_bgp_config

    - name: Verify RM_LEAF_IN is restored on leaf-lon-01
      assert:
        that:
          - "'RM_LEAF_IN' in leaf01_bgp_config.stdout[0]"
        success_msg: >-
          PASS — RM_LEAF_IN is present on leaf-lon-01.
          Rollback was applied successfully after canary failure.
        fail_msg: >-
          FAIL — RM_LEAF_IN is missing from leaf-lon-01.
          Rollback may not have been applied. Check staged_rollout.yml output.

    - name: Show BGP config for review
      debug:
        var: leaf01_bgp_config.stdout_lines

- name: Verify remaining leaves were NOT changed
  hosts:
    - leaf-lon-02
    - leaf-lon-03
  gather_facts: false
  tasks:
    - name: Collect BGP running config
      arista.eos.eos_command:
        commands:
          - show running-config section router bgp
      register: leaf_bgp_config

    - name: Verify RM_LEAF_IN is intact (rollout should not have reached these)
      assert:
        that:
          - "'RM_LEAF_IN' in leaf_bgp_config.stdout[0]"
        success_msg: >-
          PASS — {{ inventory_hostname }}: RM_LEAF_IN present.
          Staged rollout correctly halted at the canary.
        fail_msg: >-
          FAIL — {{ inventory_hostname }}: RM_LEAF_IN missing.
          The staged rollout may have pushed to this device despite the canary failure.

    - name: Show BGP config for review
      debug:
        var: leaf_bgp_config.stdout_lines

- name: Cleanup and report success
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remove breadcrumb
      file:
        path: /tmp/scenario_active.txt
        state: absent

    - name: Display success message
      debug:
        msg:
          - "=========================================="
          - "Exercise 11.3 — Verification PASSED."
          - "=========================================="
          - "Staged rollout behavior confirmed:"
          - "  - leaf-lon-01 (canary): Batfish check FAILED → rollback applied"
          - "  - leaf-lon-02: NOT changed (rollout halted at canary) ✓"
          - "  - leaf-lon-03: NOT changed (rollout halted at canary) ✓"
          - "The canary pattern successfully protected the fleet."
          - "=========================================="
