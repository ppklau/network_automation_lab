[pytest]
# ACME Investments — pytest configuration
# Applies to all pytest runs in this project (Batfish intent checks)

testpaths = batfish/tests

# Markers — used for selective test runs in CI and exercises
markers =
    zone_isolation: Zone isolation intent checks (INTENT-001, INTENT-002)
    frankfurt:      Frankfurt ring-fence checks (INTENT-003, INTENT-004)
    bgp_standards:  BGP authentication and route-map standards (INTENT-005)
    resilience:     Fabric and WAN redundancy checks (INTENT-008)
    routing_policy: Route summarisation and default-route prohibition (INTENT-006, INTENT-010)
    path_trace:     Positive and negative reachability assertions
    compliance:     All compliance-critical checks (zone_isolation + frankfurt)
    slow:           Tests that take >10s (full reachability queries)

# Default options
addopts =
    --tb=short
    --strict-markers
    -q

# Log output during tests
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S
