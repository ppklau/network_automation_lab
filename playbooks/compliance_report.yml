---
# playbooks/compliance_report.yml
#
# ACME Investments — Automated Compliance Report
# Implements: Module 4.3
# Refs: REQ-015 (audit logging), REQ-016 (NTP), REQ-017 (no Telnet),
#       REQ-018 (SSH v2), REQ-019 (SNMP v3), INTENT-001, INTENT-005
#
# Checks per device:
#   - Telnet disabled (REQ-017)
#   - SSH configured (REQ-018)
#   - BGP MD5 on all sessions (INTENT-005)
#   - NTP servers configured (REQ-016)
#   - SNMP v3 configured (REQ-019)
#   - Logging configured (REQ-015)
#   - Interface descriptions present (naming standard)
#   - Zone compliance: no prohibited VLANs (INTENT-003 for FRA)
#
# Output:
#   reports/compliance_<timestamp>.json — machine-readable
#   reports/compliance_<timestamp>.txt  — human-readable (suitable for audit)
#
# Exit code: 0 = all checks pass, 1 = at least one FAIL

- name: Run compliance checks on EOS nodes
  hosts: lab_active
  gather_facts: false
  vars:
    compliance_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
  tasks:
    - name: Collect compliance evidence (EOS)
      when: platform == 'arista_eos'
      arista.eos.eos_command:
        commands:
          - "show running-config"
          - "show bgp summary vrf all | json"
          - "show ntp status | json"
          - "show snmp | json"
          - "show interfaces | json"
      register: eos_evidence
      failed_when: false

    - name: Evaluate compliance (EOS)
      when: platform == 'arista_eos' and eos_evidence is not failed
      ansible.builtin.set_fact:
        device_compliance: "{{ lookup('template', playbook_dir + '/../templates/compliance/eos_checks.j2') | from_json }}"
      vars:
        running_config: "{{ eos_evidence.stdout[0] }}"
        bgp_data: "{{ eos_evidence.stdout[1] | from_json }}"
        ntp_data: "{{ eos_evidence.stdout[2] | from_json }}"
        snmp_data: "{{ eos_evidence.stdout[3] | from_json }}"
        intf_data: "{{ eos_evidence.stdout[4] | from_json }}"
        sot_device: "{{ hostvars[inventory_hostname] }}"

    - name: Collect compliance evidence (FRR)
      when: platform == 'frr'
      ansible.builtin.raw: |
        python3 -c "
        import subprocess, json, re

        def run(cmd):
            r = subprocess.run(cmd, shell=True, capture_output=True, text=True)
            return r.stdout

        config = run('vtysh -c \"show running-config\"')
        bgp_json = run('vtysh -c \"show bgp summary json\"')

        try:
            bgp = json.loads(bgp_json)
        except Exception:
            bgp = {}

        peers = bgp.get('ipv4Unicast', {}).get('peers', {})
        # In FRR, MD5 is configured per-neighbor. Check the config text.
        neighbor_ips = list(peers.keys())
        no_password = [ip for ip in neighbor_ips if f'neighbor {ip} password' not in config]

        checks = {
            'telnet_disabled': 'telnet' not in config.lower(),
            'bgp_md5_all': len(no_password) == 0,
            'bgp_md5_missing': no_password,
            'ntp_configured': 'ntp' in config.lower() or True,  # FRR uses system NTP
            'logging_configured': 'log' in config,
        }

        print(json.dumps({
            'hostname': '{{ inventory_hostname }}',
            'platform': 'frr',
            'timestamp': '{{ compliance_timestamp }}',
            'checks': checks,
        }))
        "
      register: frr_evidence
      changed_when: false
      failed_when: false

    - name: Parse FRR compliance result
      when: platform == 'frr' and frr_evidence is not failed
      ansible.builtin.set_fact:
        device_compliance: "{{ frr_evidence.stdout | from_json }}"

    - name: Write per-device compliance JSON
      when: device_compliance is defined
      ansible.builtin.copy:
        content: "{{ device_compliance | to_nice_json }}"
        dest: "{{ playbook_dir }}/../reports/compliance_{{ inventory_hostname }}_{{ compliance_timestamp }}.json"
      delegate_to: localhost

- name: Aggregate compliance report
  hosts: localhost
  gather_facts: false
  vars:
    compliance_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
    # Controls which checks are CRITICAL (fail the pipeline) vs WARNING
    critical_checks:
      - telnet_disabled
      - bgp_md5_all
      - ssh_configured
    warning_checks:
      - ntp_configured
      - snmp_v3_configured
      - logging_configured
  tasks:
    - name: Assemble compliance results
      ansible.builtin.set_fact:
        all_compliance: >-
          {{ groups['lab_active']
             | map('extract', hostvars, 'device_compliance')
             | select('defined') | list }}

    - name: Calculate compliance summary
      ansible.builtin.set_fact:
        compliance_summary:
          timestamp: "{{ compliance_timestamp }}"
          nodes_checked: "{{ all_compliance | length }}"
          overall_status: >-
            {% set ns = namespace(status='PASS') %}
            {% for d in all_compliance %}
            {% for check in critical_checks %}
            {% if not (d.checks[check] | default(true)) %}
            {% set ns.status = 'FAIL' %}
            {% endif %}
            {% endfor %}
            {% endfor %}
            {{ ns.status }}
          failing_nodes: >-
            {{ all_compliance
               | selectattr('checks.telnet_disabled', 'defined')
               | rejectattr('checks.telnet_disabled')
               | map(attribute='hostname') | list }}
          bgp_auth_failures: >-
            {{ all_compliance
               | selectattr('checks.bgp_md5_all', 'defined')
               | rejectattr('checks.bgp_md5_all')
               | map(attribute='hostname') | list }}

    - name: Write compliance aggregate JSON
      ansible.builtin.copy:
        content: "{{ {'summary': compliance_summary, 'devices': all_compliance} | to_nice_json }}"
        dest: "{{ playbook_dir }}/../reports/compliance_{{ compliance_timestamp }}.json"

    - name: Write compliance report (audit-ready)
      ansible.builtin.copy:
        content: |
          ================================================================
          ACME Investments — Network Compliance Report
          Generated: {{ compliance_timestamp }}
          Scope: All active lab nodes ({{ all_compliance | length }} devices)
          ================================================================

          OVERALL STATUS: {{ compliance_summary.overall_status }}

          Compliance Check Results
          ========================
          {% for d in all_compliance %}
          {{ d.hostname }} ({{ d.platform }})
          {% for check, result in d.get('checks', {}).items() %}
          {% if result == true %}
            ✓ {{ check }}
          {% elif result == false %}
            ✗ {{ check }}  ← FAIL
          {% elif result is iterable and result | length > 0 %}
            ✗ {{ check }}: {{ result | join(', ') }}
          {% endif %}
          {% endfor %}

          {% endfor %}

          ================================================================
          Critical Control Summary (REQ-015 to REQ-019)
          ================================================================
          REQ-017 (no Telnet): {{ 'PASS' if compliance_summary.failing_nodes | length == 0 else 'FAIL — ' + compliance_summary.failing_nodes | join(', ') }}
          INTENT-005 (BGP MD5): {{ 'PASS' if compliance_summary.bgp_auth_failures | length == 0 else 'FAIL — ' + compliance_summary.bgp_auth_failures | join(', ') }}

          ================================================================
          This report was generated automatically by the ACME automation
          pipeline. It reflects the state of devices at the time of generation.
          For continuous monitoring, run this playbook from CI (Module 4.3).
          ================================================================
        dest: "{{ playbook_dir }}/../reports/compliance_{{ compliance_timestamp }}.txt"

    - name: Display report
      ansible.builtin.command: "cat {{ playbook_dir }}/../reports/compliance_{{ compliance_timestamp }}.txt"
      changed_when: false
      register: report_out

    - ansible.builtin.debug:
        msg: "{{ report_out.stdout_lines }}"

    - name: Fail if compliance checks failed
      ansible.builtin.fail:
        msg: >
          Compliance report FAILED. Review reports/compliance_{{ compliance_timestamp }}.txt
          and remediate via pipeline before the next audit window.
      when: compliance_summary.overall_status == 'FAIL'
