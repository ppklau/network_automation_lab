---
# playbooks/drift_detection.yml
#
# ACME Investments — Configuration Drift Detection
# Implements: Modules 7.8, 8.2
#
# Compares the running configuration on each active device against
# the configuration that the SoT would generate. Any difference is drift.
#
# Drift is categorised:
#   INFORMATIONAL — description/comment changes, whitespace
#   WARNING       — timer changes, logging tweaks, non-functional params
#   CRITICAL      — BGP config, interface IPs, VRF, ACL, zone-relevant config
#
# Output:
#   reports/drift_<timestamp>.json  — machine-readable, per-device drift
#   reports/drift_<timestamp>.txt   — human-readable summary
#
# Exit code: 0 = no drift or informational only
#             1 = WARNING drift detected
#             2 = CRITICAL drift detected
#
# Usage:
#   ansible-playbook playbooks/drift_detection.yml
#   ansible-playbook playbooks/drift_detection.yml --limit leaf-lon-01
#   ansible-playbook playbooks/drift_detection.yml --extra-vars "auto_remediate=true"

- name: Render expected configs from SoT
  ansible.builtin.import_playbook: render_configs.yml

- name: Collect running configs from devices
  hosts: lab_active
  gather_facts: false
  vars:
    drift_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
  tasks:
    - name: Collect running config (EOS)
      when: platform == 'arista_eos'
      arista.eos.eos_command:
        commands:
          - show running-config
      register: eos_running
      failed_when: false

    - name: Collect running config (FRR)
      when: platform == 'frr'
      ansible.builtin.raw: vtysh -c "show running-config"
      register: frr_running
      changed_when: false
      failed_when: false

    - name: Set running config fact
      ansible.builtin.set_fact:
        running_config: >-
          {% if platform == 'arista_eos' %}{{ eos_running.stdout[0] | default('') }}
          {% else %}{{ frr_running.stdout | default('') }}{% endif %}

    - name: Read SoT-rendered config
      ansible.builtin.slurp:
        src: "{{ configs_output_dir }}/{{ inventory_hostname }}/running.conf"
      register: rendered_raw
      delegate_to: localhost

    - name: Analyse drift
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        import difflib, json, sys, re

        rendered = """{{ rendered_raw.content | b64decode | replace('"', '\\"') | replace('\n', '\\n') }}"""
        running  = """{{ running_config | replace('"', '\\"') | replace('\n', '\\n') }}"""

        # Normalise: strip trailing whitespace, skip comment-only lines
        def normalise(text):
            lines = []
            for line in text.splitlines():
                stripped = line.rstrip()
                if stripped.startswith('!') and len(stripped) <= 1:
                    continue   # blank ! separators
                lines.append(stripped)
            return lines

        rendered_lines = normalise(rendered)
        running_lines  = normalise(running)

        # Critical patterns — changes here are compliance-relevant
        CRITICAL_PATTERNS = [
            r'^\s*(neighbor|router bgp|remote-as|route-map|prefix-list)',
            r'^\s*(ip address|vrf|vlan)',
            r'^\s*(permit|deny)',
            r'^\s*(no ip telnet|ip telnet|no service)',
        ]
        WARNING_PATTERNS = [
            r'^\s*(timers|keepalive|hold-time)',
            r'^\s*(logging|snmp)',
            r'^\s*(ntp)',
        ]

        def classify(line):
            for pat in CRITICAL_PATTERNS:
                if re.search(pat, line, re.IGNORECASE):
                    return 'CRITICAL'
            for pat in WARNING_PATTERNS:
                if re.search(pat, line, re.IGNORECASE):
                    return 'WARNING'
            return 'INFORMATIONAL'

        diff = list(difflib.unified_diff(
            rendered_lines, running_lines,
            fromfile='sot-rendered', tofile='running-config',
            lineterm='', n=3
        ))

        changes = []
        for line in diff[2:]:   # skip the --- +++ header lines
            if line.startswith('+') or line.startswith('-'):
                content = line[1:].strip()
                if not content or content.startswith('!'):
                    continue
                changes.append({
                    'direction': 'added_on_device' if line.startswith('+') else 'missing_on_device',
                    'line': content,
                    'severity': classify(content),
                })

        max_severity = 'NONE'
        for c in changes:
            if c['severity'] == 'CRITICAL':
                max_severity = 'CRITICAL'
                break
            elif c['severity'] == 'WARNING':
                max_severity = 'WARNING'

        result = {
            'hostname': '{{ inventory_hostname }}',
            'platform': '{{ platform }}',
            'timestamp': '{{ drift_timestamp }}',
            'drift_detected': len(changes) > 0,
            'max_severity': max_severity,
            'change_count': len(changes),
            'changes': changes,
        }
        print(json.dumps(result))
        PYEOF
      register: drift_analysis
      delegate_to: localhost
      changed_when: false

    - name: Store drift result
      ansible.builtin.set_fact:
        device_drift: "{{ drift_analysis.stdout | from_json }}"

    - name: Write per-device drift JSON
      ansible.builtin.copy:
        content: "{{ device_drift | to_nice_json }}"
        dest: "{{ playbook_dir }}/../reports/drift_{{ inventory_hostname }}_{{ drift_timestamp }}.json"
      delegate_to: localhost

- name: Auto-remediate if requested
  hosts: lab_active
  gather_facts: false
  vars:
    auto_remediate: "{{ auto_remediate | default(false) }}"
  tasks:
    - name: Push SoT config to remediate drift
      when:
        - auto_remediate | bool
        - hostvars[inventory_hostname].device_drift.drift_detected | default(false)
        - hostvars[inventory_hostname].device_drift.max_severity == 'CRITICAL'
      ansible.builtin.include_tasks: "{{ playbook_dir }}/push_configs.yml"

- name: Aggregate drift report
  hosts: localhost
  gather_facts: false
  vars:
    drift_timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
  tasks:
    - name: Assemble all drift results
      ansible.builtin.set_fact:
        all_drift: >-
          {{ groups['lab_active']
             | map('extract', hostvars, 'device_drift')
             | select('defined') | list }}

    - name: Calculate drift summary
      ansible.builtin.set_fact:
        drift_summary:
          timestamp: "{{ drift_timestamp }}"
          nodes_checked: "{{ all_drift | length }}"
          nodes_with_drift: "{{ all_drift | selectattr('drift_detected') | map(attribute='hostname') | list }}"
          critical_nodes: "{{ all_drift | selectattr('max_severity', 'eq', 'CRITICAL') | map(attribute='hostname') | list }}"
          warning_nodes: "{{ all_drift | selectattr('max_severity', 'eq', 'WARNING') | map(attribute='hostname') | list }}"
          clean_nodes: "{{ all_drift | rejectattr('drift_detected') | map(attribute='hostname') | list }}"

    - name: Write drift aggregate JSON
      ansible.builtin.copy:
        content: "{{ {'summary': drift_summary, 'devices': all_drift} | to_nice_json }}"
        dest: "{{ playbook_dir }}/../reports/drift_{{ drift_timestamp }}.json"

    - name: Write human-readable drift report
      ansible.builtin.copy:
        content: |
          ================================================================
          ACME Investments — Configuration Drift Report
          {{ drift_timestamp }}
          ================================================================

          Nodes checked : {{ drift_summary.nodes_checked }}
          Nodes clean   : {{ drift_summary.clean_nodes | length }}
          Nodes drifted : {{ drift_summary.nodes_with_drift | length }}
            CRITICAL    : {{ drift_summary.critical_nodes | join(', ') | default('none') }}
            WARNING     : {{ drift_summary.warning_nodes | join(', ') | default('none') }}

          {% for d in all_drift if d.drift_detected %}
          ────────────────────────────────────────────────────────────────
          {{ d.hostname }} — {{ d.max_severity }} ({{ d.change_count }} change(s))
          {% for c in d.changes %}
          [{{ c.severity }}] {{ c.direction }}: {{ c.line }}
          {% endfor %}

          {% endfor %}
          {% if drift_summary.nodes_with_drift | length == 0 %}
          ✓ No drift detected — all devices match SoT intent.
          {% endif %}
          ================================================================
          Remediation: ansible-playbook playbooks/push_configs.yml --limit <hostname>
          Auto-remediate: ansible-playbook playbooks/drift_detection.yml --extra-vars "auto_remediate=true"
          ================================================================
        dest: "{{ playbook_dir }}/../reports/drift_{{ drift_timestamp }}.txt"

    - name: Display drift report
      ansible.builtin.command: "cat {{ playbook_dir }}/../reports/drift_{{ drift_timestamp }}.txt"
      changed_when: false
      register: report_out

    - ansible.builtin.debug:
        msg: "{{ report_out.stdout_lines }}"

    - name: Fail with exit code 2 on CRITICAL drift
      ansible.builtin.fail:
        msg: "CRITICAL drift detected. Remediate via pipeline before proceeding."
      when: drift_summary.critical_nodes | length > 0
