# ACME Investments — Rundeck project configuration
# ─────────────────────────────────────────────────────────────────────────────
# Project: acme
# This file is loaded by Rundeck on startup when placed in the project
# configuration directory. It configures the node source, executor and
# file-copier for the acme project.
#
# Node model: a single "local" node (the Rundeck container itself). All
# Ansible execution is performed by ansible-playbook running inside the
# container, so Rundeck does not need to SSH to lab devices directly.
# ─────────────────────────────────────────────────────────────────────────────

project.name=acme
project.label=ACME Lab
project.description=ACME Investments Network Automation

# ── Node executor ─────────────────────────────────────────────────────────────
# Use the local executor: job steps run as shell commands on the Rundeck
# container. Ansible handles the actual SSH sessions to lab devices.
service.NodeExecutor.default.provider=local
service.FileCopier.default.provider=local

# ── Node source ───────────────────────────────────────────────────────────────
# Single resource source: the built-in "local" node (the Rundeck container).
resources.source.1.type=local
resources.source.1.config.generateFileAutomatically=true
resources.source.1.config.includeServerNode=true

# ── SSH key (used if any job steps invoke remote SSH directly) ────────────────
project.ssh.keypath=/home/rundeck/.ssh/id_rsa

# ── Execution settings ────────────────────────────────────────────────────────
project.jobs.gui.groupExpandLevel=2
